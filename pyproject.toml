# Tooling config for COVAS++ (dev only). Runtime deps live in requirements.txt;
# dev tools (pytest, ruff) live in requirements-dev.txt. This file configures how
# those tools run — it does NOT declare the project as a package to install.

[tool.pytest.ini_options]
minversion = "7.0"
# Let `from covas...` imports resolve without installing the project.
pythonpath = ["."]
testpaths = ["tests"]
# Bare `pytest` runs UNIT tests only — offline, free, run it constantly. Integration
# tests hit real services/devices and are opt-in (see markers + commands below).
addopts = "-q -m 'not integration'"
markers = [
  "integration: touches a real external service or device; excluded from the default run",
  "local: free integration deps (Piper, Whisper, audio)",
  "paid: paid APIs (Anthropic, ElevenLabs) — run deliberately, costs money",
]
# Commands:
#   pytest                              unit only (default; no network, no cost)
#   pytest -m "integration and local"   free integration (Piper/Whisper/audio)
#   pytest -m "integration and paid"    deliberate, costs money (Anthropic/ElevenLabs)

[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = [".venv", "logs", "voicelines", "sounds"]

[tool.ruff.lint]
# The CI gate (`.github/workflows/tests.yml`) runs `ruff check .`, so the enforced rule
# set is PINNED here rather than left to ruff's default — the default has grown across ruff
# releases (0.16 flags ~1300 issues on this tree) and an unpinned gate would flip red on a
# routine ruff bump. We select the high-signal, low-noise pyflakes set:
#   F  — real errors: unused imports, undefined names, unused locals, bad f-strings.
#   E9 — syntax / IO errors (always worth failing on).
# Deliberately EXCLUDED: pycodestyle style rules (E1/E2/E5/E7 — semicolons, `l` names,
# E501 line-length) — this codebase uses compact statements and long explanatory comments
# by design; and the pyupgrade/isort/etc. opinion rules, which are churn, not correctness.
select = ["F", "E9"]
