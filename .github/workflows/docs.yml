name: Docs

# Build the MkDocs site and publish it to GitHub Pages on every push to main.
# One-time setup required by the repo owner: Settings -> Pages -> Source: "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  # Allow manually re-running the deploy from the Actions tab.
  workflow_dispatch:

# Least-privilege token scoped for Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-progress deploy; queue the next one instead.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install MkDocs + Material
        run: python -m pip install mkdocs mkdocs-material

      # --strict fails the build on a broken nav entry or internal link.
      - name: Build site (strict)
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
