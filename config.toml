# ============================================================================
#  COVAS++  —  configuration (defaults)
# ----------------------------------------------------------------------------
#  This is the single source of truth for all default settings.
#  It is COMMENTED on purpose — edit values freely.
#
#  Anything you change in the web UI is saved to `overrides.json`
#  and layered ON TOP of this file at runtime, so this file stays pristine.
#  To reset a setting back to default, just remove it from overrides.json.
# ============================================================================


[keys]
# Keyboard triggers. `keyboard`-library key names.
# HOLD push_to_talk to speak; a BRIEF TAP of the same key cancels/stops.
# You bind a joystick button to push_to_talk yourself via JoyToKey.
push_to_talk = "["
# A press shorter than this many milliseconds counts as a cancel tap, not speech.
tap_cancel_ms = 400
# Optional separate cancel key. Blank = cancel only via a tap of push_to_talk
# (the web UI's CANCEL button also always works).
cancel       = ""


[listen]
# ACTIVATION MODE (issue #63). How COVAS++ starts a turn:
#   "ptt"        — push-to-talk (DEFAULT): hold the [keys].push_to_talk key to speak.
#   "continuous" — hands-free: a voice-activity gate watches the mic, opens a capture
#                  window when you start talking, and closes it after a short silence.
# Continuous mode is LOCAL-ONLY — the same local Whisper transcribes it, so it adds no
# cloud cost just to listen. PTT still works in either mode, and a spoken command or the
# Settings page can switch modes live ("switch to continuous listening"). Barge-in is
# preserved: start talking while COVAS is speaking and it stops and captures you.
# NOTE: hands-free with speakers can hear COVAS's own voice — use a headset, or nudge
# the thresholds below, to avoid self-triggering.
mode = "ptt"
# --- Energy voice-activity tunables (only used in continuous mode) ---
# The gate slices the mic into frames of this many milliseconds and compares each frame's
# RMS loudness to energy_threshold. Bigger threshold = less sensitive (needs louder speech).
frame_ms = 30.0
# RMS amplitude (float audio ~[-1,1]) at/above which a frame counts as speech. Raise it if
# background noise keeps opening a capture; lower it if quiet speech gets missed.
energy_threshold = 0.02
# Voiced time needed to CONFIRM speech has started (debounce), so a click/clack can't open
# a capture window. Milliseconds.
start_ms = 120.0
# Minimum voiced duration for a capture to count as a real utterance; shorter blips are
# discarded as noise. Milliseconds.
min_speech_ms = 250.0
# Trailing silence that ENDS an utterance. Longer = more tolerant of mid-sentence pauses
# but slower to react; shorter = snappier but may cut you off. Milliseconds.
hangover_ms = 700.0
# --- Wake word (issue #64) — hands-free gating, OFF by default ---
# An optional arming phrase for CONTINUOUS mode. When blank (the default), continuous mode
# runs a turn on anything the voice-activity gate captures. Set it (e.g. "COVAS") and a
# hands-free capture only becomes a turn if its transcript CONTAINS the phrase — so the LLM
# isn't triggered by every stray utterance in the room. The phrase is stripped before your
# words go to the model, and push-to-talk is NEVER gated (a deliberate press always runs).
# Only affects continuous mode; ignored in ptt mode.
wake_word = ""
# Tolerate small speech-to-text slips of the wake word (e.g. "Kovas"/"Covis" for "COVAS"),
# so a one-letter mistranscription of a short call sign doesn't swallow your command. Set
# false to require an exact (still case-insensitive) match.
wake_word_fuzzy = true


[audio]
# Microphone input. Leave input_device blank to use the Windows default mic.
# Run check_setup.py to see the list of device names/indexes if you want to pin one.
input_device   = ""  # blank = the Windows default mic; or pick one on the Settings page (issue #89)
sample_rate    = 16000   # 16 kHz is what Whisper expects — leave as-is
tts_output_device = ""   # blank = default speakers/headset
# Output sample rate of the multi-bus audio mixer (C1). All bus sources (comms/SFX/music)
# are resampled onto this rate before mixing. 16 kHz matches the ElevenLabs voice stream.
mix_sample_rate = 16000
# MASTER SWITCH for the whole atmospheric audio layer (C1-C9). DEFAULT OFF. When OFF, playback
# uses the original direct path (COVAS speech opens its own device stream) — unchanged. When ON,
# a single BusMixer owns the device and ALL playback routes through it (COVAS on the clean bus;
# comms/chatter/SFX/music on their buses), and the ambient layer becomes available (each part
# still has its own enable below). Turn this on first, then enable the parts you want.
enabled = true
# Soft "thinking" bed (issue #5): a gentle, low, looping sound that fills the silence WHILE COVAS
# transcribes/thinks/searches, so a slow turn doesn't feel like it was ignored. It's a UI CUE
# (works whether or not the atmospheric mixer above is on), plays under a drop-in folder like the
# other cues (sounds/thinking/ overrides the shipped default; empty falls back), and stops the
# instant the reply starts or you cancel. Set false to keep just the single one-shot "processing"
# tick. This is a NON-VERBAL bed — never a spoken "let me look that up".
thinking_bed = true


[audio.buses]
# Multi-bus mixer levels (C-series audio layer, DESIGN §7). Each named bus has an independent
# volume trim (dB) and a mute switch. Tonal character is fixed by role — the Comms bus gets the
# radio treatment (see [audio.comms]); COVAS is deliberately clean/full-volume so the ship's own
# assistant is never filtered. Comms sits a few dB under COVAS so a radio line can't bury it.
[audio.buses.covas]
volume_db = 0.0     # the ship's assistant — clean, full volume, no processing
enabled   = true
[audio.buses.comms]
volume_db = -3.0    # NPC/player comms, radio-treated, ducked under COVAS
enabled   = true
[audio.buses.ambient]
volume_db = -6.0    # SFX layers
enabled   = true
[audio.buses.music]
volume_db = -12.0   # ambient music, well back in the mix
enabled   = true
[audio.buses.alert]
volume_db = 0.0     # warning stings
enabled   = true

[audio.comms]
# Voice ED ReceiveText comms (NPC/station lines + direct player DMs) on the radio-treated comms
# bus (C4/C5). Requires [audio].enabled + [elite].enabled (events come from the journal).
enabled = true
# Let the LLM reword NPC comms lines (paraphrase/riff, validated, verbatim fallback — C5). OFF by
# default: it costs a cheap-tier call per NPC line. When off, NPC lines are read verbatim (safe).
variants = false
# Comms-bus "over the radio" treatment, applied at RUNTIME by DSP (not pre-edited files):
# band-limit the voice, compress it, then lay in a light static bed.
band_low_hz           = 300      # high-pass: drop everything below this (radio band floor)
band_high_hz          = 3000     # low-pass: drop everything above this (radio band ceiling)
noise_level           = 0.02     # static bed amplitude (0 = no hiss)
compress_threshold_db = -12.0    # peaks above this level get pushed back down
compress_ratio        = 4.0      # how hard (higher = more level-flattening)

[audio.voices]
# Voice cast (C10). COVAS (you) always speak on ElevenLabs with the persona voice
# ([elevenlabs].voice_id). The NPC/comms/chatter CAST is drawn from a pool of RANDOM voices, kept
# consistent per speaker within a play session: an NPC/station keeps its voice until you jump to a
# new system; a player keeps theirs for the whole session (the last 25 players are remembered);
# chatter picks a fresh random voice per line.
# `cast_provider` is the cast's default/fallback provider: "elevenlabs" (DEFAULT — random voices,
# but BURNS ElevenLabs credits on every comms/chatter line) or "piper" (LOCAL, free, runs beside
# the game). To go back to the free local path, set cast_provider = "piper" and add Piper .onnx
# entries to the pool below. Direct player DMs use `player_ref` (a Piper .onnx path or an EL
# voice_id); blank = a pool voice, else the persona.
cast_provider = "elevenlabs"
player_ref    = ""
# When the pool below is EMPTY and this is on, the cast is auto-seeded with RANDOM voices from your
# ElevenLabs library (minus the COVAS persona voice, so the cast always sounds like someone else).
# Set false to keep a single voice (the persona) unless you populate the pool yourself.
random_el     = true
# The cast pool — one entry per voice. Leave EMPTY to use the random ElevenLabs default above. Add
# voices as array-of-tables to pin an explicit cast (this overrides random_el), e.g.:
#   [[audio.voices.pool]]
#   provider = "piper"                        # "piper" or "elevenlabs"
#   ref      = "voices/en_US-ryan-high.onnx"  # a Piper .onnx path, or an EL voice_id
#   gender   = "male"                         # "male" / "female" / "neutral" (gendered NPCs match)
pool = []
# Per-role provider override (issue #14, optional/advanced). Each cast ROLE can use a DIFFERENT
# TTS provider; roles you don't list fall back to `cast_provider` above. Roles: comms, chatter,
# player, interdiction (and "cast" = the pool default). COVAS's OWN persona voice is [tts].provider,
# not a cast role. Every provider registers in the same registry, so a voice ladder is possible —
# free local Piper for chatter, premium ElevenLabs for station comms, etc. Example:
#   [audio.voices.providers]
#   chatter = "piper"
#   comms   = "elevenlabs"

[audio.chatter]
# Space-chatter FREQUENCY (C6). Chatter is POPULATED-ONLY (it never fires out in empty/unpopulated
# space) and POPULATION-SCALED: the seconds BETWEEN chatter lines slide between these two bounds
# with the system's population. A busy hub chatters near `min_seconds`; a sparse outpost stretches
# toward `max_seconds`. The global C3 governor ([audio.cues]) still caps the overall rate on top.
min_seconds = 45.0        # fastest gap (dense system, population >= full_population)
max_seconds = 240.0       # slowest gap (barely-populated system)
# Population at/above which chatter runs at the fast `min_seconds` gap. The scale is logarithmic
# (ED populations span thousands to tens of billions), so a value of 1e9 puts major hubs at full
# chatter and small outposts near the slow end. Lower it to make more systems feel "busy".
full_population = 1000000000

[audio.carrier]
# Fleet-carrier context voices (issue #19). When you're at (or in the same system as) the fleet
# carrier you OWN, three named roles bring it to life on the radio-treated comms bus, each with its
# OWN configurable voice and display name: the Captain (welcome/status flavor, in-system + aboard),
# Tower Control (docking/traffic flavor, while docked), and anonymous carrier chatter (deck/crew
# buzz, while docked). Every line is from a curated pool (never the LLM), and literal docking
# messages still come through the normal comms voices — this layer is pure atmosphere on top.
#
# Requires [audio].enabled + [elite].enabled (the "at my own carrier" context is derived from the
# journal). The voices are naturally SILENT unless you own a carrier and are there, so this is on
# by default. Say "mute the carrier" / "carrier voices on" to toggle at runtime.
enabled = true
# Each role below takes:
#   name          — the spoken display name, woven into the role's lines (Captain / Tower Control).
#   voice_ref     — the voice: an ElevenLabs voice_id or a Piper .onnx path. BLANK = a distinct,
#                   stable voice auto-picked from the cast pool, so each role still sounds like a
#                   different person with zero setup.
#   voice_provider — optional; the TTS provider for this role ("elevenlabs" / "piper" / "edge" /
#                   "azure" / "openai"). Blank = the [audio.voices.providers] override for the role,
#                   else the cast provider. Any registered provider works.
#   gender        — optional hint ("male" / "female" / "neutral") for the auto-picked fallback.
[audio.carrier.captain]
name           = "Captain"
voice_ref      = ""
voice_provider = ""
gender         = "neutral"
[audio.carrier.tower]
name           = "Tower Control"
voice_ref      = ""
voice_provider = ""
gender         = "neutral"
[audio.carrier.chatter]
name           = ""
voice_ref      = ""
voice_provider = ""
gender         = "neutral"

[audio.sfx]
# Ambient SFX cues (C8): local samples (git-ignored, supply your own) on the ambient bus,
# eligibility-gated (hyperspace / deep space). Each is a LIST of sample paths; empty = silent.
# Picked + rate-governed by [audio.cues]; DEFAULT OFF with the rest of the cue layer.
thargoid_voices      = []
hyperspace_weirdness = []
space_radiation      = []

[audio.interdiction]
# Pirate-interdiction layered cue (C8): on a journal Interdiction/UnderAttack, a warning sting
# (alert bus), the assistant's threat line (COVAS bus, clean), and the pirate's line (comms bus,
# radio). Off by default. `sting` is the alert-bus sample path (git-ignored); blank uses the
# built-in default path (supply your own file there).
enabled = true
sting   = ""


[music]
# Ambient music layer (C7). A curated, PRE-GENERATED local library played on the music bus and
# crossfaded when the game context changes (combat / near-star / deep space / populated / nebula).
# Track files are LOCAL and git-ignored (supply your own, rights uncertain — like sounds/): drop
# them under music/ and list them per context below. Generation is deliberately NOT a runtime
# dependency (no official Suno API). DEFAULT OFF.
enabled = true

[music.tracks]
# Each context -> an ordered list of track paths (relative to the project root). Empty = silent
# for that context; the director picks deterministically and crossfades on a context change.
combat_adjacent = []
near_star       = []
deep_space      = []
populated       = []
nebula          = []
default         = []   # fallback when the current context has no tracks of its own

[audio.cues]
# Cue driver + governor (C3) — the anti-over-talking budget for the ambient audio layer (SFX,
# space chatter, music, comms). On a game-state change the driver asks the cue registry which
# cues are eligible and the governor picks ONE within these hard limits (deterministic rotation,
# never random). Over-talking is the primary failure mode, so these are firm.
#
# DEFAULT OFF — the whole audio-cue layer is opt-in. Cue payloads (chatter/SFX/music) arrive in
# later prompts (C5-C8); until then this drives nothing even when enabled.
enabled          = true
min_interval     = 8.0    # seconds between ANY two cues (a hard gap so nothing stacks up)
max_per_minute   = 6      # global cap: at most this many cues in any rolling 60 seconds
default_cooldown = 30.0   # a cue won't repeat within this many seconds unless it sets its own
# Let the LLM generate flavor chatter musings (fact_bearing=false lines only, validated to assert
# nothing checkable — C6). When on, each musing is GROUNDED in your live situation (issue #85) —
# inhabited vs. the empty black, what you're doing, recent beats like an interdiction or low fuel —
# so lines vary with the moment while staying fact-safe; repeats are filtered and any LLM
# error/off falls back to the curated pool. OFF by default (cost) and gated by the optimization
# level (only active at "Full"); when off, chatter is curated pool lines only.
flavor           = false


[whisper]
# Local speech-to-text (faster-whisper). Bigger model = more accurate, slower.
# Options: tiny, base, small, medium, large-v3.  base/small/medium are the sweet spots.
model       = "small"
# Whisper runs on the CPU (issue #128) — no GPU needed, and nothing here competes with Elite for
# the GPU. Leave device = "cpu".
device      = "cpu"
# int8 = fast + low memory on CPU (the recommended default).
compute_type = "int8"
language    = "en"       # force English; set "" to auto-detect
# Where faster-whisper caches downloaded weights. Blank = the default HuggingFace cache
# (dev machines reuse their existing models). A packaged build overrides this to a per-user
# models dir so weights never land in the read-only install tree. Relative paths resolve
# under the writable data dir.
download_root = ""


[anthropic]
# API key file (relative paths resolve under the writable data dir). The first-run wizard writes
# the key here, ENCRYPTED at rest with Windows DPAPI (the file holds "DPAPI:<blob>", not plaintext;
# a legacy plaintext key is migrated to encrypted on first read). Environment variables are NOT
# read for keys (removed in #22) — this file is the only source. Never commit it.
api_key_file = "AnthropicAPIKey.txt"
# Model shown/selected at runtime. Default + the two alternates you asked for.
# Cost-tuned default: Sonnet-5 balances quality vs. price for a voice companion.
# Flip back to "claude-opus-4-8" here (or via the UI dropdown) any time you want
# maximum quality for a session.
model = "claude-sonnet-5"
# Available models the UI dropdown will offer:
available_models = ["claude-opus-4-8", "claude-sonnet-5", "claude-haiku-4-5-20251001"]
# Hard cap on reply length (tokens). Kept short: replies are spoken aloud, so a
# few sentences is plenty, and a low cap trims BOTH Claude output tokens and
# ElevenLabs characters. The router can raise it for an explicit "full breakdown"
# turn. Must exceed the thinking budget below if thinking is ever enabled.
max_tokens = 1024
# Prompt-cache lifetime for the (static) system prompt + tool schemas. In-game
# voice turns are sporadic — often 15-20 min apart — so the default 5-minute cache
# expires between them and every turn pays a full cache WRITE with no read benefit.
# "1h" survives the gaps (costs ~2x on the write, ~0.1x on the read). Use "5m" for
# the cheaper-per-write default when talking continuously. See [pricing] below.
cache_ttl = "1h"

[anthropic.thinking]
# Named thinking-depth tiers shown in the UI. "Off" disables thinking.
default = "Off"
# Current-gen models (claude-opus-4-8, claude-sonnet-5) control thinking depth
# with an EFFORT level, not a token budget. Each tier maps to an effort value:
[anthropic.thinking.effort]
Low    = "low"
Medium = "medium"
High   = "high"
Extra  = "xhigh"
Max    = "max"
# Older models that still use a token budget (e.g. claude-haiku-4-5) map each
# tier to a budget instead. (Minimum the API accepts is 1024.)
[anthropic.thinking.budget]
Low    = 1024
Medium = 4096
High   = 8192
Extra  = 16384
Max    = 32000


[pricing]
# Per-model token prices in US dollars per 1,000,000 tokens, used only to turn the
# usage counts the API returns into a rough per-turn cost estimate in the log. TUNE
# these when Anthropic pricing changes — they don't affect what you're billed.
#   input       = uncached input tokens (full price)
#   output      = generated tokens
#   cache_write = writing the prompt cache. Sized for the 1-hour TTL (~2x input);
#                 halve toward ~1.25x input if you switch [anthropic].cache_ttl to "5m".
#   cache_read  = reading from the cache (~0.1x input) — the whole point of caching.
# Keys are matched to the model id exactly, then by prefix (so "claude-haiku-4-5"
# also covers "claude-haiku-4-5-20251001"). Unknown models estimate as $0.00.
[pricing."claude-sonnet-5"]
input = 3.0
output = 15.0
cache_write = 6.0
cache_read = 0.30
[pricing."claude-opus-4-8"]
input = 5.0
output = 25.0
cache_write = 10.0
cache_read = 0.50
[pricing."claude-haiku-4-5"]
input = 1.0
output = 5.0
cache_write = 2.0
cache_read = 0.10
# OpenAI provider (#12) rough rates so the usage log shows a cost (TUNE / add rows for the model you
# use — Groq/DeepSeek/OpenRouter ids differ; an unlisted model just estimates $0.00).
[pricing."gpt-4o-mini"]
input = 0.15
output = 0.60
[pricing."gpt-4o"]
input = 2.50
output = 10.0
# Gemini provider (#13) rough rates (TUNE — add rows for the model you use; an unlisted model
# estimates $0.00). Flash-Lite is the cheap/default tier; Flash is standard; Pro is premium/depth.
# Ids are DEPRECATION-PROOF `-latest` ALIASES (issue #91): pinning a concrete id keeps breaking —
# the guessed gemini-3.1-flash-lite 404'd, and the GA gemini-2.5-* family is now "superseded" and
# heading for deprecation. The `-latest` aliases always resolve to Google's current GA model in each
# class (e.g. gemini-flash-latest → gemini-3.5-flash), so they survive the churn. Alias PRICING
# tracks whatever underlying GA model the alias resolves to — these are best-effort per-class rates;
# retune if Google shifts a class's price. Sources: https://ai.google.dev/gemini-api/docs/models and
# https://ai.google.dev/gemini-api/docs/changelog (verified 2026-07-16). Rates USD per 1M tokens.
[pricing."gemini-flash-lite-latest"]
input = 0.10
output = 0.40
[pricing."gemini-flash-latest"]
input = 0.30
output = 2.50
[pricing."gemini-pro-latest"]
input = 1.25
output = 10.0
cache_read = 0.31


[router]
# Cost router (DESIGN §4): route each turn to the cheapest capable cloud model,
# escalating only when the turn earns it. This is where recurring cost really drops.
#
# DEFAULT OFF — while disabled, every turn uses the fixed [anthropic].model above
# (currently Sonnet), so nothing changes until you flip this to true. Turn it on once
# you've eyeballed a few sessions and are happy with Haiku-by-default.
enabled = true
# Tier model ids for the ANTHROPIC provider (the tier->model map, issue #11). The router picks a
# canonical tier — cheap/standard/premium — and these map it to a model: default = the Haiku
# workhorse (banter, acks, checklist reads); escalate = Sonnet (depth/analysis, current-data turns);
# premium = Opus (explicit ask). A DIFFERENT [llm].provider ignores these and uses its own map in
# [<provider>].tiers.{cheap,standard,premium} (or a single [<provider>].model) — the same routing
# policy below then drives it. The router-off model is [anthropic].model (or [<provider>].model).
default_model  = "claude-haiku-4-5"
escalate_model = "claude-sonnet-5"
premium_model  = "claude-opus-4-8"
# Manual tier pin (a UI toggle / "force a tier" knob). Blank = let the rules decide.
# Set to "haiku", "sonnet", or "opus" to force every turn to that tier.
pin = ""
# Raised reply cap (tokens) for an explicit "full breakdown"-style request, so a long
# answer isn't truncated mid-sentence over TTS. Normal turns use [anthropic].max_tokens.
full_breakdown_max_tokens = 2048
# Phrase rules (case-insensitive substring match on the spoken text). Deterministic and
# explainable; tune these from real transcripts. A cheap-classifier pass can come later.
escalate_phrases       = ["think hard", "ask the big brain", "big brain"]
premium_phrases        = ["use opus", "ask opus"]
depth_phrases          = ["analyze", "analyse", "in detail", "in depth", "deep dive", "explain why", "walk me through", "compare", "pros and cons"]
web_phrases            = ["latest", "current", "right now", "look up", "search the web", "the news", "up to date", "how much is"]
full_breakdown_phrases = ["full breakdown", "give me everything", "long version", "complete breakdown", "the whole rundown"]


[web_search]
# Native web search runs automatically whenever Claude needs current info
# (no UI toggle — it just works under the covers). Set false to hard-disable.
enabled = true
# Max searches Claude may run per reply. Kept low: each search result is pulled
# into context and then persists in the rolling history, inflating the cost of
# every following turn in the session too.
max_uses = 3


[personality]
# When ON, the system prompt is composed as Base + selected Persona + your Campaign (N7).
# When OFF, no system prompt is sent — replies are plain/neutral (and the "Commander" address
# + campaign context go away, as expected).
enabled = true
# The selected PERSONA (voice/register), by name from the presets file below (or a Custom one
# you saved via the Personality tab). "Classic" is the default voice.
persona = "Classic"
# Shipped, committed presets (Base + selectable personas). No personal data — safe to share.
presets_file = "personalities/presets.md"
# Custom personas you save (git-ignored). One file per persona.
custom_dir = "personalities/custom"
# Auto-voice-pairing (issue #96). When ON, at startup the app pairs a sensible default ElevenLabs
# voice with EACH shipped persona (LLM-decided, in the BACKGROUND — startup is never blocked), so
# selecting a persona brings a fitting voice instead of everyone using the one configured voice.
# An explicit voice you set for a persona ALWAYS wins and is never overwritten. Needs the active
# TTS provider to be ElevenLabs with a key + catalog; it's ONE cheap-tier, one-time (cached) call,
# gated by the optimization level (#84) — skipped on lean/constrained levels. Off -> no pairing,
# the current default voice is kept.
auto_voice_pairing = true
# Where the generated pairing cache is written (git-ignored, per-account). Keyed by a hash of the
# persona set + your available voice ids, so it recomputes ONLY when those change — not every launch.
voice_pairings_file = "personalities/voice_pairings.json"
# Your CAMPAIGN — personal facts about your Commander (name, ranks, holdings, ongoing goals).
# Git-ignored, kept SEPARATE from the persona so switching voice never wipes it.
campaign_file = "campaign.txt"
# Legacy monolithic prompt. Until campaign.txt exists, this is used as the campaign
# (back-compat) — paste your personal facts into the Campaign editor and you can retire it.
# Copy personality.example.txt to personality.txt to start from the shipped default.
file    = "personality.txt"


[crew]
# INTERACTIVE CREW (issue #69). DEFAULT OFF. When ON, the LLM may voice a NAMED crew member in an
# ordinary reply by starting a line with their name in square brackets — e.g. "[Nyx] Contact off
# the port bow." — and that line is spoken in the character's OWN distinct, radio-filtered voice
# (reusing the C10 voice cast). Lines with NO bracket prefix stay the ship persona (COVAS++), which
# remains the DEFAULT speaker. Crew voices are DETERMINISTIC: the same name always maps to the same
# pool voice, distinct names to distinct voices (an empty voice pool degrades to the persona voice).
# When OFF, replies are spoken verbatim exactly as before (any stray "[...]" is just read as text).
enabled = false
# Optional roster — a HINT list of crew names woven into the (static) system instruction so the
# model reaches for consistent characters. Free-form: a name the model invents still gets a stable
# voice via the cast. Leave empty to let the model pick names that fit the moment. This is the
# LEGACY inline form; the CREW EDITOR (issue #70, below) supersedes it with per-character personas
# + explicit voices, and is used whenever the roster file exists.
roster = []
# CREW EDITOR roster file (issue #70). A small JSON list of {name, persona, voice_ref} the control
# panel's Crew tab edits — personas fold into the (static) system instruction so each character has
# consistent personality, and a non-blank voice_ref pins that character to a specific cast voice
# (blank = the deterministic auto-assignment). Git-ignored (persona text is personal). When this
# file is absent, the legacy `roster` list above is used instead, so existing setups are unchanged.
file = "crew.json"
# HIRED NPC-CREW registry (issue #125). Elite writes no snapshot of currently-hired crew, so we
# harvest your fighter pilots' names from the sparse journal events (CrewHire / CrewAssign /
# NpcCrewPaidWage / NpcCrewRank / CrewFire) into this small git-ignored seen-set, keyed by CrewID,
# that survives restarts. The Crew editor reads it to offer your ACTUAL pilots to ADOPT (prefill
# name + role + a generated persona). Journal-derived per-user data — never committed.
npc_registry_file = "npc_crew.json"


[elevenlabs]
# API key file (git-ignored). The first-run wizard / Settings "API keys" card write the key here,
# ENCRYPTED at rest with Windows DPAPI (the file holds "DPAPI:<blob>", not plaintext; a legacy
# plaintext key — or one you paste into ElevenLabsAPIKey.txt yourself — is migrated to encrypted on
# first read). Env vars are NOT read for keys (#22). Never commit it.
api_key_file = "ElevenLabsAPIKey.txt"
# TTS model + voice. Voice id is what actually gets used; name is for display.
model      = "eleven_flash_v2_5"
voice_id   = "EXAVITQu4vr4xnSDxMaL"
voice_name = "Sarah"
# Voice speed is now the ONE normalized [tts].speed below (issue #99), applied to WHICHEVER TTS
# provider is active — not a per-provider setting. (A legacy [elevenlabs].speed in an old config or
# overrides.json is still honored as a fallback when [tts].speed is absent.)
# Audio format streamed back for playback. pcm_16000 = low-latency, cancellable.
output_format = "pcm_16000"


# Sound cues are now DROP-IN FOLDERS, not config paths (I8) — there is no [sound_cues]
# section any more. Local audio plays INSTANTLY on each state change (zero latency); a
# RANDOM file is picked from the type's folder, so drop in 1 file or 50 for variety.
#   listen     = ready for voice input (push-to-talk pressed)
#   processing = working / hitting the web
#   completed  = answer ready, just before speech plays
#   failure    = any failure (no speech heard, API/TTS error, ...)
# COVAS++ ships original defaults under covas/assets/cues/<type>/. To use your OWN cues,
# drop audio into  <data dir>/sounds/<type>/  — while a type's folder holds >=1 file it
# REPLACES the shipped default set; empty it to fall back. In a source run the data dir is
# the project root (so the folder is ./sounds/<type>/, git-ignored); a packaged build uses
# %APPDATA%\COVAS++\sounds\. The control panel has an "Open cues folder" button.


[checklist]
# Your "ultimate checklist" — a markdown to-do list read/updated by voice.
# Format: "- [ ]" to-do, "- [x]" done. Ask "what's my next item?" / "mark it complete".
# Relative to the project root.
file = "ultimate_checklist.md"


[memory]
# Persistent memory (issue #59). Small facts about you and your play — how you like to be
# addressed, your main ship, standing preferences — that the companion can recall later.
# TRANSPARENT by design: stored as a plain, human-readable JSON-lines file you can open,
# read, edit, or prune in any text editor. It lives under your writable data dir and is
# GIT-IGNORED (private) — never committed, unlike the opaque memory in other ED assistants.
enabled = true
# Directory (relative to your data dir) holding the memory file (memory.jsonl). Git-ignored.
dir = "memory"
# Automatic CAPTURE (issue #60). When enabled, COVAS++ populates memory WITHOUT being asked,
# from two cheap, cost-free sources: curated journal MILESTONES (first discoveries, deaths,
# rank-ups, big payouts, a new ship/carrier — deterministic, no LLM per event) and durable
# conversation FACTS the companion notes when you state a standing preference or say "remember
# that…" (piggybacked on the reply it's already writing — no extra model call). Every capture
# is deduped against what's already stored; the embedding path stays OFF, so capture never
# costs money or touches the network.
# Upper bound on stored records so an always-on capture can't grow the file without limit. When
# full, the oldest auto-captured journal milestones are pruned FIRST (they're reproducible from
# the journal); facts you explicitly asked to remember are pruned only if they alone exceed it.
cap = 500
# Recall detection (issue #61). When a spoken turn reaches into the past ("do you remember…",
# "what's my favourite…", "have I been here before"), the most relevant stored facts are
# prepended to THAT turn so the companion answers from memory instead of guessing — it goes in
# the user message, NEVER the cached system prompt, so recall can't bust the prompt cache. The
# LLM can also look memory up explicitly via the recall_memory tool. Case-insensitive substring
# phrases; tune these from real transcripts (mirrors [elite]'s context detection).
#   recall_wake     = force a memory look-up for this turn (manual override; word is scrubbed
#                     from what the model sees), e.g. "recall, what's my main ship".
#   recall_phrases  = natural asks that trigger a look-up ("do you remember", "what's my"…).
recall_wake    = ["recall"]
recall_phrases = ["do you remember", "you remember", "do you recall", "what do you remember",
                  "what do you know about", "remind me what", "remind me of", "did i tell you",
                  "did i ever tell you", "i told you", "we talked about", "we discussed",
                  "last time", "have i been", "have i done", "have i ever", "my favourite",
                  "my favorite", "my preferred", "i prefer", "what's my", "what is my",
                  "how do i like", "how i like", "what do you call me", "my usual"]

[memory.embedding]
# OPTIONAL semantic recall via text embeddings. DEFAULT OFF — and off is the whole point:
# recall works out of the box with pure keyword/tag matching, which is offline, free, and
# needs no extra dependency. Embeddings can recall by meaning (not just shared words) but
# cost money and/or a heavy local model and phone home, so you opt in deliberately. No
# backend ships yet; when enabled without a working provider, recall falls back to keyword.
enabled  = false
provider = ""   # name of an embedding backend (none available yet); blank = keyword only


[elite]
# Elite Dangerous game-state monitoring (DESIGN §5). When ON, two watcher threads tail
# the Journal.*.log + Status.json that ED writes to disk and publish semantic events on
# the EventBus, keeping a rolling "current context" (system, station, ship, fuel, cargo)
# the companion can reference via where_am_i / ship_status. No memory reading, no API keys.
#
# DEFAULT OFF — opt in once you want it. The watchers only publish events and update
# context; they never initiate speech (proactive callouts are a later phase).
enabled = true
# Journal directory. Blank = the standard location, resolved per machine:
#   %USERPROFILE%\Saved Games\Frontier Developments\Elite Dangerous
# Status.json is read from this same directory. Set an absolute path only if yours differs
# (e.g. a non-default Saved Games location).
journal_dir = ""
# How often (seconds) to re-scan the journal for appended lines / a rolled-over file.
journal_poll_interval = 0.5
# How often (seconds) to poll Status.json for flag transitions.
status_poll_interval = 1.0
# How many recent notable events (jumps, docks, missions, fuel alerts) to keep in the
# rolling feed that answers "what just happened / check my logs".
recent_events_kept = 25
# Context detection (DESIGN §5). When a spoken turn references live game state, the current
# status (+ recent events for a log question) is prepended to THAT turn so the companion
# answers from real telemetry instead of guessing — it never touches the cached system
# prompt. Case-insensitive substring phrases; tune these from real transcripts.
#   context_wake   = force a context lookup for this turn (manual override; word is scrubbed
#                    from what the model sees). Also injects the recent-events log.
#   status_phrases = "where am I", "my fuel", "my ship"… -> inject current status.
#   log_phrases    = "what just happened", "check my logs"… -> also inject recent events.
context_wake   = ["context"]
status_phrases = ["where am i", "where are we", "what system", "current system", "which system",
                  "am i docked", "docked at", "my fuel", "how much fuel", "fuel level",
                  "how's my fuel", "my ship", "what ship", "my cargo", "how much cargo",
                  "landing gear", "hardpoints", "supercruise", "am i in", "my location",
                  "my status", "ship status"]
log_phrases    = ["what just happened", "what happened", "recent events", "my log", "my logs",
                  "check the log", "check my log", "last jump", "what did i just",
                  "what have i been", "what have i done", "recently", "my journal", "so far"]


[proactive]
# Proactive callouts (DESIGN §5). When ON, the companion INITIATES speech on notable ED
# events (arriving in a system, docking, completing a mission, low fuel, overheating,
# death) without a push-to-talk press — a short in-character line via the cheap tier.
# Requires [elite].enabled (that's where the events come from).
#
# DEFAULT OFF — opt in once you're happy with it. It never talks over you: a callout only
# fires when idle, and a PTT press cancels one mid-sentence like any other speech. Mute it
# on the fly by voice ("COVAS, stop the callouts") — see the mute_proactive tool.
enabled = true
# No two callouts (of any type) fire within this many seconds — so a burst of transitions
# (jump -> supercruise exit -> dock) yields at most one line.
min_interval = 20
# The same event type won't re-announce within this many seconds.
cooldown = 120
# Reply cap (tokens) for a callout — it's one sentence, so keep it tight and cheap.
max_tokens = 120
# Per-event whitelist: only events set true here are ever announced. Add ED event names
# (journal events like FSDJump/Docked/MissionCompleted/Died, or status transitions like
# LowFuel/Overheating) to extend; set false to silence one. This table REPLACES the
# built-in defaults, so list every event you want.
[proactive.events]
FSDJump          = true   # arrived in a new system
Docked           = true   # docked at a station
MissionCompleted = true
LowFuel          = true   # fuel dropped below 25%
Overheating      = true   # ship over 100% heat
Died             = true
# On-foot / SRV awareness (#54) — callouts in the modes COVAS++ used to be silent in.
ScanOrganic      = true   # exobiology sample logged ("one more to analyse")
OxygenLow        = true   # on-foot suit oxygen dropped below 25%
HealthLow        = true   # on-foot health critical
SrvHullLow       = true   # SRV hull dropped below 30%


[route]
# Route callouts (N4) — proactive heads-ups while flying a plotted galaxy-map route. Reads the
# jump list (with star classes) from NavRoute.json and follows progress via FSDJump. Announces:
#   * whether the NEXT star is SCOOPABLE (KGBFOAM) as you lock each jump — so you don't arrive
#     low on fuel at an unscoopable star;
#   * jumps remaining to the destination, every Nth jump;
#   * arrival at the final system.
# These go through the proactive path: spoken only when idle (never over you), a push-to-talk
# tap cancels one, and the proactive mute ("stop the callouts") silences them too. Requires
# [elite].enabled (that's where the events come from).
#
# DEFAULT OFF — opt in once you want it.
enabled = true
# Announce jumps-remaining every Nth jump. Lower = chattier. Scoopable + arrival are separate.
every_n = 5
# Per-callout toggles — silence any one kind without turning the whole feature off.
callout_scoopable       = true
callout_jumps_remaining = true
callout_arrival         = true


[keybinds]
# Keybind automation (DESIGN §6) — the companion presses ONE ship control (toggle landing
# gear) on request, behind a hard safety layer. This is the prototype: prove one reliable
# action before generalizing. The model only SELECTS a named macro; a deterministic executor
# sends the actual scancodes (ED reads DirectInput scancodes, so we inject at that level).
#
# DEFAULT OFF — this is the twitchy part; opt in deliberately. Requires [elite].enabled for
# the combat guard (it reads ED Status flags to refuse acting during combat/interdiction).
enabled = true
# Bindings file override. Blank = auto-detect: read the active preset from
#   %LOCALAPPDATA%\Frontier Developments\Elite Dangerous\Options\Bindings\StartPreset.4.start
# then load "<preset>.4.0.binds" from that folder. Set an absolute path (or a filename
# relative to that Bindings folder) only if auto-detection picks the wrong file.
binds_file = ""
# Require explicit Commander confirmation before any action fires. Arming an action does NOT
# execute it — the Commander must confirm on a SEPARATE spoken command. Leave ON.
require_confirmation = true
# Refuse to touch controls when ED Status reports danger/interdiction (and when ED status is
# unavailable — we won't act unless we can prove it's safe). Leave ON.
combat_guard = true
# Bring the Elite Dangerous window to the foreground right before pressing a ship control (or
# sending a comms message), so a spoken command can't misfire into a window that stole focus
# (#105). A no-op when Elite is already the active window (cheap check, no cost while flying).
# The explicit "focus Elite" voice command works regardless of this toggle; turn this OFF only if
# you want injection to use whatever window currently has focus (the old behaviour). Leave ON.
focus_before_inject = true
# Only offer/allow actions valid for the CURRENT game mode (mainship / fighter / SRV / on-foot,
# read from ED Status). Stops on-foot actions being offered while flying, and vice-versa. When
# the mode is unknown (ED monitoring off), gating is skipped and the combat guard still applies.
# Leave ON.
mode_guard = true
# Which .binds slot to read the keyboard key from: "primary" or "secondary". Primary is right
# for almost everyone — ED puts the KEY on Primary and a joystick/HOTAS on Secondary, so Primary
# is where the pressable key is. Set "secondary" only if you deliberately put COVAS's keyboard
# binds on the Secondary slot. Either way we fall back to the other slot.
binding_preference = "primary"
# Seconds an armed action stays confirmable before it expires for safety.
confirm_window = 60
# Allowlist of macro names the companion may run — the ONLY actions permitted, even if asked
# for others. Ships exactly one by default: landing_gear (toggle). Add a name below to opt a
# macro in. Available Tier-1 ship-systems macros (#31, benign single-tap main-ship toggles,
# fire immediately — no confirmation): cargo_scoop, night_vision, ship_lights, hud_mode,
# pips_engines, pips_weapons, pips_systems, pips_balance. Each needs the matching control bound
# to a KEY in Elite Dangerous. Example: allowlist = ["landing_gear", "cargo_scoop", "ship_lights"]
# for others. Default ships exactly one: landing_gear (toggle). Add any of the names below to
# opt each action in (default OFF keeps behavior unchanged/safe). The action must also be bound
# to a KEY in Elite Dangerous; an unbound one degrades to a spoken "bind it in-game" message.
#
# Tier-1 flight/nav batch (#30) — main-ship (some also in a ship-launched fighter):
#   throttle_zero, throttle_50, throttle_100      — set throttle (benign, fires immediately)
#   frame_shift_drive                             — engage FSD / jump    (arm-and-confirm)
#   supercruise, hyperspace                       — engage SC / jump     (arm-and-confirm)
#   flight_assist                                 — toggle flight assist (arm-and-confirm)
#   select_target_ahead, cycle_next_target, cycle_previous_target  — targeting (benign)
#   target_next_route_system                      — target next route system (benign)
#   nav_lock                                      — toggle nav lock      (benign)
# e.g. allowlist = ["landing_gear", "throttle_zero", "target_next_route_system"]
# for others. Ship default stays landing_gear (toggle) so you opt each extra action in by name.
# Odyssey ON-FOOT batch (#34) — benign, mode-gated to disembarked (never offered while flying).
# Add any you want (all fire immediately behind the combat guard; none need a spoken confirm):
#   on_foot_flashlight, on_foot_night_vision, on_foot_select_primary, on_foot_select_secondary,
#   on_foot_select_utility, on_foot_holster, on_foot_energylink, on_foot_profile_analyser,
#   on_foot_suit_tool, on_foot_crouch, on_foot_galaxy_map
# e.g. allowlist = ["landing_gear", "on_foot_flashlight", "on_foot_night_vision"]
# for others. Ships default to landing_gear (toggle). Opt each extra macro in BY NAME.
# SRV / buggy batch (#35), offered only while driving the SRV: drive_assist, srv_headlights,
#   srv_night_vision, srv_cargo_scoop, srv_auto_brake (benign toggles), and recall_ship
#   (summons/dismisses your ship — arms-and-confirms). e.g.
#   allowlist = ["landing_gear", "drive_assist", "srv_headlights", "recall_ship"]
# for others. Ships exactly one by default: landing_gear (toggle). Add names to opt in.
#
# Tier-1 benign UI actions (#32) — panels, maps, fire groups: no confirmation needed (opening
# a panel/map or cycling a fire group is harmless), but still behind the combat + mode guards.
# Add any you want to enable, e.g. allowlist = ["landing_gear", "open_galaxy_map"]. Available:
#   focus_left_panel, focus_right_panel, focus_comms_panel, focus_role_panel, quick_comms,
#   open_galaxy_map, open_system_map, cycle_fire_group_next, cycle_fire_group_previous,
#   ui_back, ui_focus, toggle_headlook
allowlist = ["landing_gear"]


[reflex]
# Tier-2 COMBAT REFLEXES (DESIGN §6, issue #36) — a SEPARATE, combat-PERMISSIVE control policy
# that deliberately INVERTS the [keybinds] one above. Where keybinds REFUSE to touch controls
# during combat/interdiction, a reflex only makes sense WHILE under fire: chaff, heat sink,
# shield cell, boost. So this guard permits its small set ONLY when ED Status reports danger or
# interdiction, and still HARD-REFUSES dangerous actions (eject cargo, self-destruct, landing
# gear) at all times. It shares the same key executor as [keybinds]/[honk], so one hard abort
# ("abort") releases every held key.
#
# DEFAULT OFF and the allowlist ships EMPTY — the whole Tier-2 path is opt-in; with it off the
# app behaves exactly as if reflexes didn't exist. Requires [elite].enabled: the guard must read
# ED Status to positively confirm you're in danger before firing (no telemetry -> refused).
#
# Two reflexes are wired end-to-end today — chaff (fire_chaff) and heat sink (fire_heat_sink) — on
# the VERBAL path here, the second-PTT phrase-spotter (#38), and the AUTOMATIC layer ([reflex.auto]
# below). A local phrase-spotter (#38) and the auto layer (#37) build ON this same guard.
enabled = false
# Enforce the combat-permissive guard (leave ON). OFF is an escape hatch that lets a permitted
# reflex fire regardless of Status — but the always-refused set stays refused even then. Shared by
# the verbal, phrase-spotter, and automatic reflex paths.
combat_guard = true
# Allowlist of reflex NAMES the companion may fire ON COMMAND — the ONLY reflexes the verbal/spotter
# path permits, entirely SEPARATE from [keybinds].allowlist AND from the [reflex.auto] enables below.
# Ships EMPTY (opt-in). Available reflexes:
#   chaff        — fire the chaff launcher (FireChaffLauncher)   [wired end-to-end]
#   heat_sink    — deploy a heat sink (DeployHeatSink)           [wired end-to-end]
#   shields, boost                                               [policy-recognized; not yet wired]
# The action must also be bound to a KEY in Elite Dangerous; an unbound one degrades to a spoken
# "bind it in-game" message. Example: allowlist = ["chaff", "heat_sink"]
allowlist = []
# SECOND push-to-talk for the reflex FAST PATH (issue #38). Bind this to a DIFFERENT key/button
# than [keys].push_to_talk. A capture on this key is transcribed locally and matched against a
# FIXED combat vocabulary (no LLM) — on a hit the reflex fires in ~STT time (a heartbeat), routed
# through the SAME combat-permissive guard + hard abort as above; on a miss it falls through to a
# normal conversation turn, so this key still works as an ordinary talk key. Default BLANK =
# disabled (no second hook installed; the main PTT is untouched). Requires [reflex].enabled and an
# allowlisted+bound reflex to actually fire. `keyboard`-library key name, e.g. ptt = "]".
# Fixed vocabulary (say any synonym on the reflex key):
#   chaff     — "chaff", "flares", "decoy", "break lock"
#   heat_sink — "heat", "heat sink", "dump heat"      [wired end-to-end]
#   shields   — "shields", "shield cell", "cell"      [policy-recognized]
#   boost     — "boost", "punch it"                   [policy-recognized]
#   abort     — "abort", "stop", "cancel", "release"  (shared hard abort — releases every held key)
ptt = ""

# --- Tier-2 AMBIENT auto-reflexes (#37) ---------------------------------------------------------
# Fire the SAME reflexes AUTOMATICALLY off Elite Dangerous Status/journal thresholds — no voice,
# no LLM round-trip, the only sub-100ms path. Each reflex takes the SAME combat-permissive guard
# (above) and shared key executor as the verbal path, plus a cooldown so a sustained overheat or a
# long fight can't machine-gun presses. Requires [elite].enabled (the trigger reads Status) AND
# [reflex].enabled above — that master switch turns on the whole Tier-2 subsystem this nests under.
[reflex.auto]
# Master switch for the automatic layer. OFF by default; even ON, nothing fires until you enable a
# reflex by name below (both levels default OFF — opt in deliberately).
enabled = false
# Global governor: no two auto-reflexes of ANY kind fire within this many seconds, so a burst of
# overlapping transitions (enter danger -> interdicted -> overheat) yields at most one press.
min_interval = 3.0

# Auto-deploy a heat sink when the ship overheats. Trigger: ED's Overheating flag (set at > 100%
# heat). `threshold` is the heat percent to react at — the default 100 fires on the overheat flag;
# a value above 100 disables it by threshold (ED never reports hotter than the flag). Still gated
# by the combat-permissive guard, so with the guard ON it fires only while ALSO in danger; set
# [reflex].combat_guard = false if you want it to fire on overheat regardless (e.g. fuel scooping).
[reflex.auto.heat_sink]
enabled = false
threshold = 100.0
cooldown = 10.0

# Auto-fire chaff when a hostile has a lock — on the danger/interdiction/under-attack triggers.
# A pure boolean trigger (no numeric threshold): it fires whenever Status shows you're in danger
# or being interdicted, which is exactly when the guard permits it.
[reflex.auto.chaff]
enabled = false
cooldown = 20.0


[comms_send]
# Send in-game COMMS TEXT by voice (issue #49) — compose an Elite Dangerous chat message from
# what you say and send it to local/system, your wing, your squadron, or as a direct message,
# without opening the comms panel and typing. The model composes the words ("tell local o7",
# "message my wing: forming up at the nav beacon") and picks the channel; COVAS opens the chat
# box, PASTES the text via the clipboard (more reliable than per-character typing), and sends.
#
# OUTWARD-FACING — other Commanders SEE the message — so it's behind a MANDATORY read-back gate:
# COVAS reads the composed message back and sends ONLY after you confirm on a SEPARATE spoken
# command ("confirm" / "send it"). There is NO way to disable that gate; an un-confirmed send is
# never performed. This also guards against a garbled transcription reaching strangers.
#
# DEFAULT OFF — opt in deliberately. Shares the keybind scancode executor (one hard "abort"
# releases any key it pressed). No ED monitoring required — the read-back is the safety, not a
# combat guard.
enabled = false
# Seconds a composed message stays confirmable before it expires for safety.
confirm_window = 60
# ED action token that OPENS the chat text box (drops the cursor into chat). QuickCommsPanel is
# the usual one; bind it to a KEY in Elite Dangerous (Controls) — a HOTAS-only bind can't be
# pressed. An unbound one degrades to a spoken "bind it in-game" message.
open_bind = "QuickCommsPanel"
# Pause (seconds) after focusing the box / selecting a channel / pasting, so the chat field
# keeps up before the next keystroke.
settle_seconds = 0.15
# Per-channel ED action tokens that SELECT each channel before sending. Elite has no universal
# per-channel send key, so these are yours to set (bind them in-game if you use them). Leave a
# channel BLANK to send on your currently-selected comms channel (fine for the common local-chat
# case). A configured-but-unbound key fails soft with a "bind it in-game" message.
channel_local = ""
channel_wing = ""
channel_squadron = ""
channel_direct = ""


[macros]
# Custom macros (issue #50) — the HEADLINE feature: you AUTHOR your own named macros by voice
# (or in the control panel), instead of only invoking the fixed [keybinds] catalog. Example:
#   "Create a macro called Dock ASAP. When docking is granted, throttle to zero and drop the
#    landing gear." -> saved, and it auto-runs next time docking is granted. Say "run Dock ASAP"
# to trigger it manually, or "list my macros" / "delete Dock ASAP" to manage them.
#
# A custom macro is DELIBERATELY confined: it may ONLY use actions in [keybinds].allowlist above
# (so it can never do anything you haven't already opted into — weapons/eject are impossible),
# only gate on game-status flags COVAS already reads, and only bind to journal/Status events it
# already folds. Anything else is refused at authoring with a templated error — COVAS never
# invents an action. Macros run through the SAME executor + combat guard + hard abort as
# [keybinds], and consequential ones need a separate spoken "confirm" before they run.
#
# DEFAULT OFF — opt in deliberately. Requires [keybinds] set up (bound keys + an allowlist) to
# actually press anything, and [elite].enabled for the combat guard and for triggers to fire.
enabled = false
# Require a separate spoken confirmation before a consequential macro runs (a macro is treated as
# consequential if any of its actions is, or if you asked for confirmation). Leave ON.
require_confirmation = true
# Refuse to run a macro during danger/interdiction (and when ED status is unavailable — we won't
# act unless we can prove it's safe). Leave ON.
combat_guard = true
# Only run a macro whose actions are valid for your CURRENT game mode. Leave ON.
mode_guard = true
# Seconds an armed macro stays confirmable before it expires for safety.
confirm_window = 60
# Where saved macros live (JSONL, one macro per line). Relative paths resolve under the writable
# data dir; git-ignored (a macro is your content). Blank/default: custom_macros.jsonl there.
file = "custom_macros.jsonl"


[honk]
# Auto-honk (N5) — fire the Discovery Scanner shortly after arriving in a NEW system, so you scan
# the system without lifting a finger. The model isn't involved — arrival triggers a deterministic
# keystroke. Requires [elite].enabled (for the arrival event, supercruise/analysis flags, guards).
#
# No fire-group setup: COVAS just fires your CURRENT group's Primary/Secondary button and reacts.
# If that opens the Surface Scanner (wrong group) it backs out, warns, and pauses until re-armed;
# a weapons group can't fire in supercruise (harmless). Guards: supercruise + analysis mode +
# not in danger. ON by default — the probe-and-recover makes it safe with no fire-group setup.
enabled = true
# Which fire button the Discovery Scanner is on: "primary" or "secondary".
trigger = "primary"
# How long (seconds) to HOLD the fire button — a full honk takes a few seconds to complete.
hold_seconds = 5.0
# Refuse to honk during danger/interdiction (and when ED status is unavailable — we won't act
# unless we can prove it's safe). Leave ON.
combat_guard = true


[nav]
# Find-closest-module AND find-closest-ship (voice: "find the closest station that sells
# module X" / "...that sells ship X"). Both share this section. Each resolves the item
# conversationally against a BUNDLED offline table (modules: ask/confirm/cancel; ships: ask
# on an ambiguous family like Krait/Cobra/Type — no network), then runs ONE Spansh station
# search for the nearest station selling it, sorted by distance from your current system, and
# copies the SYSTEM name to the clipboard. Needs [elite].enabled for the live current-system
# (else it falls back to the newest journal's last jump/location).
#
# DEFAULT OFF — opt in once you want it.
enabled = true
# Spansh station-search endpoint. Synchronous JSON POST; the module filter honours name/class
# only, so mount + landing pad are filtered client-side from the results (Spansh quirk).
base_url = "https://spansh.co.uk/api/stations/search"
# Sent as the HTTP User-Agent — be a polite API citizen and identify the app.
user_agent = "COVAS-Plus-Plus/0.1 (Elite Dangerous voice companion)"
# Default landing-pad size your ship needs (S/M/L). My main ships need Large. The voice
# request can override per-search; set "any" to not filter by pad.
default_pad_size = "L"
# How many nearest module-selling stations to fetch per search before client-side
# mount filtering picks the closest match. 50 comfortably covers the common cases.
search_size = 50
# SHIP search only: verify each candidate's CURRENT stock against EDSM before answering.
# Spansh's per-station ships list is the station's CATALOG (every hull ever seen there),
# not its live stock — EDSM keeps the latest shipyard snapshot, the same data Inara shows,
# so with this ON the answer matches Inara. Costs a few sub-second lookups per search.
# Turn OFF only if EDSM is misbehaving (answers then come with a "couldn't verify" caveat).
verify_stock = true
# Require an explicit, SEPARATE-turn confirmation ("yes" / "confirm") before the search runs.
# DEFAULT OFF — as soon as the module is fully resolved (name + any needed size/mount) it
# searches immediately; this is a read-only lookup, so the extra confirm turn is just friction.
# Turn ON to gate it: a hard turn-counter (like the keybind safety layer) then requires a new
# command to confirm, so the model can't resolve-and-confirm in a single turn.
require_confirmation = false


[star_systems]
# Star-system voice search (voice: "find the nearest Empire system with high security").
# LLM-native, stateless conversational slot-filling over the shared Spansh client: filter by
# allegiance, government, economy, security, population, Powerplay, or colonization state,
# nearest first from your current system, and copy the system name to the clipboard. Spoken
# values are validated against a bundled canonical vocabulary (from the live Spansh API)
# before any query, so a misheard filter is corrected, not silently widened. Needs
# [elite].enabled for the live current-system (else it falls back to the newest journal).
enabled = true
# Sent as the HTTP User-Agent — be a polite API citizen and identify the app.
user_agent = "COVAS-Plus-Plus/0.1 (Elite Dangerous voice companion)"
# How many nearest matching systems to fetch per search; the closest is the answer.
search_size = 50


[search]
# The remaining LLM-native voice search categories, enabled as a group (they share this
# section). Same stateless, conversational shape as [star_systems], over the shared Spansh
# client, each copying the primary system to the clipboard:
#   * stations       — nearest station by service, type, landing pad, distance, or faction
#                      ("nearest station with a shipyard and a large pad"). Says "no carriers"
#                      to exclude fleet carriers; "close to the star" means within ~1000 Ls.
#   * minor factions — nearest system where a faction is present or in control, or by
#                      allegiance / government / state ("where the Dark Wheel is present").
#   * signals        — nearest structure by type: megaship, settlement, outpost, starport.
#   * faction states — nearest system by controlling-faction state: wars, civil wars, boom,
#                      election, infrastructure failure (and the missions those generate).
# Spoken values are validated against bundled canonical vocabularies (from the live Spansh
# API) before any query. Needs [elite].enabled for the live current-system.
enabled = true
# Sent as the HTTP User-Agent — be a polite API citizen and identify the app.
user_agent = "COVAS-Plus-Plus/0.1 (Elite Dangerous voice companion)"
# How many nearest matches to fetch per search; the closest is the answer.
search_size = 50


[bodies]
# Body / bio-geo signal finder (#68). Voice: "find the nearest Earth-like world", "the closest
# body with Bacterium signals". Same stateless, LLM-native shape as [star_systems]/[search], but
# over the Spansh bodies/search endpoint — a TARGETED single-body lookup (complements the Road-to-
# Riches ROUTE planner in [riches_plan], which plans a whole scan run). Filter by:
#   * body type      — Earth-like / ammonia / water world, high-metal-content, a gas-giant class…
#   * biological signal — an exobiology genus (Bacterium, Stratum, Tussock…), a specific species
#                      (Bacterium Aurasus), or "any biological" (via Spansh's landmark_subtype).
#   * landable, and/or distance from the main star (light-seconds).
# Nearest first from your current system; the match's SYSTEM is copied to the clipboard for the
# galaxy map. Spoken values are validated against bundled canonical vocabularies (from the live
# Spansh API) before any query, so a misheard type/biology is corrected, not silently widened.
# Needs [elite].enabled for the live current-system. DEFAULT OFF — opt in.
enabled = false
# Sent as the HTTP User-Agent — be a polite API citizen and identify the app.
user_agent = "COVAS-Plus-Plus/0.1 (Elite Dangerous voice companion)"
# How many nearest matching bodies to fetch per search; the closest is the answer.
search_size = 50


[route_plan]
# Trade-route planner (#44, on the #41 route foundation). Voice: "plan me a trade route from
# here". Plans a Spansh trade loop starting from the station you're docked at, speaks the WHOLE
# loop (each hop: what to buy where, where to sell, profit per ton) plus the round-trip total,
# flags any leg resting on stale prices, and hands the next stop to the galaxy map — via the
# CLIPBOARD for now (paste it into the galaxy-map search); the in-game "set course" keybind
# handoff arrives with the Tier-1 galaxy-map action (#32). Needs [elite].enabled for the live
# docked-station start. DEFAULT OFF — opt in.
#
# Per-run refinements (max hops, large-pad, arrival distance, include-planetary, avoid-loops,
# max price age) are spoken tool args, not config — just mention them ("...avoiding planetary
# ports", "...large pad only"). The settings below are the defaults those args fall back to.
enabled = false
# Sent as the HTTP User-Agent — be a polite API citizen and identify the app.
user_agent = "COVAS-Plus-Plus/0.1 (Elite Dangerous voice companion)"
# Default number of hops in the trade loop when you don't specify one.
default_max_hops = 4
# Market-price freshness: hops whose source price is older than this (days) get a spoken "these
# prices are ~N days old" caveat — volatile market data answered honestly, not silently stale.
# A per-run "max_price_age_days" tool arg overrides this for one plan.
max_price_age_days = 2


[neutron_plan]
# Neutron / long-range GALAXY route planner (#43) — the neutron-highway workhorse on the same
# #41 route foundation as the trade planner. Voice: "plot a neutron route to Colonia". Give a
# destination system + your laden jump range (start defaults to your current system) and it plots
# a long-range route via Spansh's neutron plotter, speaks the summary (total jumps, number of
# waypoints, the first one), and hands the first waypoint to the galaxy map — via the CLIPBOARD
# for now (paste it into the galaxy-map search); the in-game "set course" keybind handoff arrives
# with the Tier-1 galaxy-map action (#32). Needs [elite].enabled for the current-system default
# start. DEFAULT OFF — opt in.
enabled = false
# Sent as the HTTP User-Agent — be a polite API citizen and identify the app.
user_agent = "COVAS-Plus-Plus/0.1 (Elite Dangerous voice companion)"
# Default Spansh efficiency (1-100) when you don't specify: higher rides more neutron detours for
# fewer total jumps; 60 is the site's sensible middle ground.
default_efficiency = 60


[riches_plan]
# Road-to-Riches planner (#42) — a sibling of the trade planner on the SAME Spansh route client.
# Voice: "plan me a Road to Riches route". From your CURRENT system (or a start you name) plus your
# laden jump range, it plans a chain of nearby systems with high-value UNSCANNED bodies to
# First-Discovery-scan for exploration credits, speaks a summary (first system, how many bodies,
# estimated first/total value), and hands the FIRST system to the galaxy map — via the CLIPBOARD
# for now (paste it into the galaxy-map search); the in-game "set course" keybind handoff arrives
# with the Tier-1 galaxy-map action (#32). Needs [elite].enabled for the live current-system start.
# DEFAULT OFF — opt in.
enabled = false
# Sent as the HTTP User-Agent — be a polite API citizen and identify the app.
user_agent = "COVAS-Plus-Plus/0.1 (Elite Dangerous voice companion)"
# How far (light-years) around your start to look for scannable systems when you don't say.
default_radius = 50.0
# Default number of systems in the route when you don't specify one.
default_max_results = 25
# Skip bodies whose estimated scan value is below this (credits) when you don't say.
default_min_value = 300000
# Fold the extra FSS-mapping value into each body's estimated worth (matches Spansh's default).
use_mapping_value = true


[mining_helper]
# Mining helper (#45) — plan and run a mining session. Voice: "where's the nearest Painite hotspot"
# or "plan a Low Temperature Diamonds run". From your CURRENT system (or a start you name) it finds
# the nearest ring HOTSPOT for the material (Spansh bodies/search), the best FRESH place to SELL it
# (Spansh stations/search, sell price highest-first), drops the go-to-hotspot / mine / sell-here
# loop onto your checklist as trackable steps, and hands the hotspot system to the galaxy map — via
# the CLIPBOARD for now (paste it into the galaxy-map search); the in-game "set course" keybind
# handoff arrives with the Tier-1 galaxy-map action (#32). Needs [elite].enabled for the live
# current-system start. DEFAULT OFF — opt in.
#
# The DIFFERENTIATOR is freshness: mining prices swing hard and the highest headline sell prices are
# usually YEARS-stale fleet-carrier data, so transient carriers are dropped and a stale quote is
# spoken only WITH an age caveat — never trusted silently.
#
# Per-run refinements (large-pad-only, a tighter price-age window, skip the checklist, skip the
# plot) are spoken tool args, not config — just mention them. The settings below are the defaults.
enabled = false
# Sent as the HTTP User-Agent — be a polite API citizen and identify the app.
user_agent = "COVAS-Plus-Plus/0.1 (Elite Dangerous voice companion)"
# Sell-price freshness: a best-sell quote older than this (days) is spoken with a "that price is ~N
# days old" caveat. A per-run "max_price_age_days" tool arg overrides this for one plan.
max_price_age_days = 2
# Drop the mining loop (go to hotspot -> mine -> sell here) onto your checklist as trackable steps.
# A per-run "add_to_checklist" tool arg overrides this for one plan.
add_to_checklist = true


# Location & carrier voice commands (N3) — "copy my current system" and "where's my fleet
# carrier" — need no configuration: the PERSONAL (owned) carrier is auto-tracked from the
# journal (name, callsign, current system via CarrierStats / CarrierLocation), pinned to the
# owned carrier's id so a squadron carrier can't be mistaken for it. Requires [elite].enabled.
# Squadron-carrier location isn't queryable from any public database, so that command just
# points you at the in-game Carrier Management tab — nothing to configure.


[cg]
# Community-Goal voice queries (N6). Journal-primary: "what's my standing in <CG>" and the CGs
# you've VISITED come from your journal — no config, works offline. To also surface CGs you
# HAVEN'T visited (the complete active list), configure an external feed.
#
# EDSM has no public community-goals API (verified at build time — every endpoint 404s), so the
# supported feed is Inara's getCommunityGoalsRecent, which needs a free generic Inara API key
# (inara.cz -> Settings -> 3rd party APIs -> generate an app key). Without a key it stays
# journal-only. Enter or rotate the key on the Settings page; it takes effect on restart.
source = "inara"       # "inara" (external feed) or "none" (journal-only)
api_key_file = "InaraAPIKey.txt"   # DPAPI-encrypted at rest under your data dir (git-ignored)
# DEPRECATED, kept only for one-time migration: a plaintext key left here (or in overrides.json)
# is moved into the encrypted InaraAPIKey.txt on first run and this value is blanked. Don't commit it.
inara_api_key = ""     # blank = journal-only


[conversation]
# Rolling in-session history so follow-ups work. Older turns are trimmed
# once the running message count exceeds this many (user+assistant) turns.
max_turns = 20


[logging]
# Per-session prompt/response transcript files land here (git-ignored, personal).
# Relative to the project root.
dir = "logs"


[hud]
# Companion HUD (issue #47, epic #40) — a transparent, always-on-top, NON-interactive 2D
# overlay window showing the companion-centric data COVAS++ already has: the voice-loop state
# (listening / thinking / speaking), your current checklist step, route progress (jumps
# remaining + whether the next star is scoopable), and the last proactive callout. Rendered
# with stdlib tkinter (zero new dependency) per the #46 spike; on Windows it's transparent and
# click-through, so it never intercepts input meant for the game.
#
# DEFAULT OFF — opt in here, from the Settings page, or by voice ("turn the HUD on"). Fails soft
# where there's no display or toolkit (e.g. a headless box): it simply doesn't appear.
enabled = false

# In-headset VR overlay (issue #48, epic #40) — the SAME four-field HUD as a true SteamVR
# overlay floating in the cockpit, so VR players don't have to alt-tab to a desktop window. It
# reuses the exact 2D adapter; only the rendering surface differs (SteamVR IVROverlay via the
# bundled `openvr` binding). Independent of the 2D `enabled` above: you can run either, both,
# or neither.
#
# DEFAULT OFF. Needs SteamVR running and Elite Dangerous rendering in VR through SteamVR (Link /
# Air Link / Virtual Desktop in SteamVR mode all count) — nothing to install. ATTACH-ONLY: it
# only shows if SteamVR is ALREADY running and never launches it, so leaving this on under VDXR /
# OpenComposite / flat desktop is harmless (it just stays off — no SteamVR gets dragged up). FAILS
# SOFT with no VR: if SteamVR isn't running it simply doesn't appear — no error, the 2D HUD (if
# enabled) still works. Quest players on OpenComposite / VDXR / Virtual Desktop (no SteamVR) can
# get the HUD in-headset via the transparent WEB HUD below and OpenKneeboard (see
# docs/using/hud.md) — NOT OVR Toolkit, which is itself a SteamVR-only overlay app.
#
# NOTE: releases up to v0.12.0 were frozen WITHOUT the openvr binding, so this setting did
# nothing at all in them regardless of your VR setup.
vr_enabled = false

# Web HUD (issue #103, epic #40) — the SAME four-field HUD served as a transparent web page at
# http://<ui host:port>/hud, for OpenKneeboard's Web Dashboard tab. OpenKneeboard is an OpenXR
# API layer in-process to the game, so its Chromium tab composites over Elite Dangerous on ANY
# runtime — OpenComposite / VDXR / Virtual Desktop — where a separate-process SteamVR overlay
# (vr_enabled above) structurally cannot. The page is transparent by construction: only the text
# and panel border draw over your cockpit, no opaque capture rectangle.
#
# DEFAULT OFF. Needs the CONTROL PANEL running (run_covas_ui.py, not the headless run_covas.py —
# there's no web server to serve /hud otherwise) and a one-time OpenKneeboard setup (add a Web
# Dashboard tab pointing at /hud). Turning it OFF blanks the page in-headset with no OpenKneeboard
# interaction. Independent of `enabled` and `vr_enabled`: run any, all, or none.
web_enabled = false
# Where the panel sits: "world" (cockpit-fixed, parked in front of the seated origin — the
# comfortable default) or "head" (locked to your view, follows where you look).
vr_placement = "world"
# Physical width of the overlay quad in metres (0.15–3.0). ~0.55 m reads well at arm's length.
vr_width_m = 0.55
# The panel's position, tilt, and curve. ALL of these apply LIVE — change them on the Settings
# page or by voice ("set the VR HUD distance to 1.5", "set the VR HUD curvature to 0.1") and a
# shown overlay moves immediately, no re-toggle. Tune them in-headset and keep what feels right.
vr_distance_m = 1.30    # how far in front, in metres (0.30–5.0)
vr_offset_x_m = 0.0     # left/right, in metres (−2.0–2.0; + = right)
vr_offset_y_m = -0.12   # up/down, in metres (−2.0–2.0; + = up, − = below eye-line)
vr_pitch_deg = 0.0      # tilt in degrees (−60–60; + leans the top toward you, good when low)
vr_curvature = 0.1      # 0 = flat, 1 = full cylinder; ~0.1 is a gentle ED-style wrap (tuned in-headset)
vr_yaw_deg = 0.0        # heading in degrees; 0 = straight ahead. Usually set by SAYING "pin the
                        # HUD here" (look-to-place) — swings the panel to where you're facing —
                        # rather than typed. Nudges: "move the HUD left/closer", "tilt it up", etc.


[ui]
# Local control panel.
host = "127.0.0.1"
port = 8765
# Control-panel colour theme (issue #104): "dark" (default), "light", or "elite" (the game's
# orange-on-black cockpit HUD look). Applies live from the Settings page (Appearance) or by
# voice ("switch to the light theme"); no restart.
theme = "dark"


# ============================================================================
#  PROVIDERS — the swappable pieces of the voice loop (see covas/providers).
# ============================================================================

[llm]
# Which LLM answers. "anthropic" (cloud, Claude — the default), "openai" (any OpenAI-compatible
# cloud endpoint: OpenAI/Groq/DeepSeek/OpenRouter — see [openai]), or "gemini" (Google Gemini native
# API, function calling + Search grounding — see [gemini]). All are CLOUD providers, fine in-game and
# tiered by the cost router (see [router]) — cost is handled by that tiering, NOT a local LLM (a
# useful local model would compete with Elite Dangerous for the GPU).
provider = "anthropic"
# Capability/token OPTIMIZATION LEVEL (issue #84). COVAS advertises ~47 tools every turn (~10.4K
# tokens of tool schemas). That's fine on a prompt-caching, high-TPM endpoint but fatal on a low-TPM
# free tier (Groq free = 12K tokens-per-minute -> HTTP 413/429) and wasteful on a non-caching paid
# one. This picks how many tool clusters to advertise AND whether background LLM calls (proactive
# callouts, chatter flavor, comms variants) run, packed by a token budget:
#   "auto"     — choose per provider (DEFAULT): Anthropic/Gemini/OpenAI/DeepSeek/OpenRouter -> Full;
#                Groq (groq.com) -> Minimal (its free tier is token-starved; a PAID Groq user sets
#                this to "Full"); an unknown custom base_url -> Full (or use custom_tpm below).
#   "Full"     — every tool; proactive + chatter-flavor + comms-variants ON.
#   "Standard" — drop the Search + Engineering clusters; proactive ON, chatter/variants OFF.
#   "Lean"     — core + checklist + Commander-state + settings/help; all background OFF.
#   "Minimal"  — core + checklist only; all background OFF (safe for a 12K-TPM free tier).
#   "Bare"     — conversation only, NO tools; all background OFF.
# Chosen ONCE at startup and held for the session so prompt caching stays warm.
optimization_level = "auto"
# Optional tokens-per-minute for a CUSTOM/unknown endpoint (auto mode only). 0 = ignore. When set,
# auto maps it to a level (<15K -> Minimal, <30K -> Lean, <60K -> Standard, else Full), so you can
# right-size the tool budget for an endpoint we don't recognize without picking a level by hand.
custom_tpm = 0
# Latency watchdog (issue #97): if a turn goes this many seconds WITHOUT a spoken reply — a slow
# first token, a provider retry/backoff, or a hung connection — COVAS speaks a short, plain-language
# "the AI service is being slow, I'm still trying" line in the CURRENT voice so you're not left in
# silence. It's a heads-up, not a failure: if the reply then lands, it follows normally. 0 disables.
slow_warning_seconds = 30
# Misconfiguration heads-up (issue #108): a bad model id (404), a wrong/missing API key (401/403),
# or a bad request (400/422) — persistent, user-fixable errors that retry won't help — speak a short
# "I can't reach <provider>, check the AI settings" line naming the likely fix (key vs. model) on
# EVERY failed turn, not just once. false = keep the old silent cue+log-only behavior for these.
speak_config_errors = true

# Transient-error retry (issue #97). A cloud LLM has bad minutes (Anthropic 529 "Overloaded",
# OpenAI/Groq 429s, Gemini 503s, connection blips). Instead of dying on one, COVAS retries the
# request with exponential backoff + jitter, honoring the server's Retry-After, staying cancel-aware
# (a barge-in aborts the wait), and capping the TOTAL wait so a turn never feels hung. Non-transient
# errors (bad key, 404 model, 400 validation) fail fast — retrying them just wastes time. Shared by
# every LLM provider; the Anthropic SDK is driven from the same knobs (its own internal retries).
[llm.retry]
enabled = true          # false -> a single try, no retry
attempts = 4            # total tries (1 initial + up to 3 retries)
base_delay = 0.5        # first backoff in seconds; grows x2 each retry (0.5, 1, 2, 4…)
max_delay = 4.0         # per-sleep ceiling
max_total_wait = 20.0   # HARD cap on cumulative backoff for one turn — keeps it interactive
jitter = 0.25           # add up to this fraction of the delay at random, to avoid herd retries

[openai]
# OpenAI-compatible LLM (issue #12) — ONE implementation for OpenAI, Groq, DeepSeek, and OpenRouter:
# only `base_url` + the model ids differ. Select it with [llm].provider = "openai". Tool calling
# (the checklist voice commands) works; there is no web-search tool on this path (Anthropic-only).
#
# The key comes from this git-ignored file (copy OpenAIAPIKey.txt.example), DPAPI-encrypted at rest
# and SHARED with the OpenAI TTS provider. Env vars are NOT read for keys (#22). NEVER commit it.
#   OpenAI:     base_url = "https://api.openai.com/v1"          (default)
#   Groq:       base_url = "https://api.groq.com/openai/v1"     model = "llama-3.3-70b-versatile"
#   DeepSeek:   base_url = "https://api.deepseek.com/v1"        model = "deepseek-chat"
#   OpenRouter: base_url = "https://openrouter.ai/api/v1"       model = "openai/gpt-4o-mini"
base_url     = "https://api.openai.com/v1"
api_key_file = "OpenAIAPIKey.txt"
model        = "gpt-4o-mini"

[openai.tiers]
# The cost router's tier -> model map for the OpenAI provider (issue #11). The router picks a tier
# (cheap/standard/premium) and these name the model. Every key is UNSET by default, so all tiers
# reuse [openai].model above — that way a bare model swap (change base_url + model to Groq/DeepSeek/
# OpenRouter, e.g. via the Settings page) "just works" through the router, instead of a shipped
# OpenAI-only default (gpt-4o-mini) shadowing your model and 404ing on another endpoint. Only set a
# key here if you actually want DISTINCT per-tier models on THIS endpoint (they must be valid ids for
# whatever base_url points at); an unset key falls back to [openai].model.
# cheap    = "gpt-4o-mini"
# standard = "gpt-4o"
# premium  = "gpt-4o"

[gemini]
# Google Gemini on the NATIVE API (issue #13) — function calling (checklist voice commands) plus
# Google-Search GROUNDING that parallels web search (gated by [web_search].enabled). Select it with
# [llm].provider = "gemini". A cheap/fast Flash default tier makes it a strong low-cost option.
#
# The key comes from this git-ignored file (copy GeminiAPIKey.txt.example), DPAPI-encrypted at rest.
# Env vars are NOT read for keys (#22). Get a free key at https://aistudio.google.com.
# NEVER commit the key. `base_url` rarely changes.
base_url     = "https://generativelanguage.googleapis.com/v1beta"
api_key_file = "GeminiAPIKey.txt"
# DEPRECATION-PROOF alias (issue #91): pinning a concrete id kept breaking (the guessed
# gemini-3.1-flash-lite 404'd; the GA gemini-2.5-* family is now "superseded"). The `-latest` alias
# always resolves to Google's current GA Flash-Lite, so it survives model churn. Refresh guidance:
# GET {base_url}/models?key=… or https://ai.google.dev/gemini-api/docs/models
model        = "gemini-flash-lite-latest"

[gemini.tiers]
# The router's tier -> model map for Gemini (issue #11): Flash-Lite for cheap/default banter, Flash
# for standard, Pro for depth. Omit a key to reuse [gemini].model. Ids are DEPRECATION-PROOF `-latest`
# ALIASES (issue #91) — they always resolve to Google's current GA model per class (e.g.
# gemini-flash-latest → gemini-3.5-flash per the changelog), instead of a concrete id that gets
# retired out from under us. Sources: https://ai.google.dev/gemini-api/docs/models and
# https://ai.google.dev/gemini-api/docs/changelog (verified 2026-07-16).
cheap    = "gemini-flash-lite-latest"
standard = "gemini-flash-latest"
premium  = "gemini-pro-latest"

[tts]
# Which voice speaks (COVAS's OWN persona voice). "edge" (FREE neural voices via edge-tts — see
# [edge] below; the default), "elevenlabs" (cloud, premium), or "piper" (local, offline, free).
# NOTE: Edge is free but rides an undocumented, no-SLA endpoint (see [edge]); set [piper].model so
# a broken endpoint falls back to local Piper instead of degrading to text.
provider = "edge"
# ONE normalized voice speed (issue #99) for whichever provider above is active: 1.0 = the voice's
# normal pace, below 1.0 slower, above 1.0 faster; range 0.5–2.0. Each adapter maps this into its own
# native speed control and clamps to that voice's real limits (ElevenLabs 0.7–1.2; Edge/Azure/OpenAI/
# Cartesia/Piper go wider), so a value a provider can't reach is capped, never sent raw to error the
# API — and switching providers can't carry an out-of-range value across. Sent only when != 1.0, so
# the default request is unchanged.
speed = 1.0

[piper]
# Local neural TTS. Download a voice on this machine, e.g.:
#   python -m piper.download_voices en_US-lessac-medium
# then set model to the resulting .onnx (its .onnx.json must sit beside it).
# Relative paths are resolved against the project root.
model = ""

[edge]
# Edge "Read Aloud" neural TTS via edge-tts — FREE, no API key, hundreds of voices. Great for the
# NPC/comms/chatter CAST so ambient chatter never burns ElevenLabs credits (set
# [audio.voices].cast_provider = "edge", or a per-role override in [audio.voices.providers]).
#
# ⚠ OPTIONAL / NOT LOAD-BEARING. edge-tts rides an UNDOCUMENTED endpoint Microsoft intends for the
# Edge browser: it is ToS-gray, has NO SLA, and periodically breaks when Microsoft rotates its
# anti-abuse tokens. When it's down, COVAS's persona voice fails soft to Piper (if [piper].model is
# set) and cast voices fall silent — Piper stays the guaranteed free floor. Official Azure Neural
# TTS (same voices, with an API + SLA) is the version to actually depend on.
#
# `voice` is the persona/status voice ShortName used when [tts].provider = "edge". Browse the full
# catalog with:  .venv\Scripts\python.exe -m edge_tts --list-voices
voice = "en-US-AriaNeural"

[azure]
# Official Azure Neural TTS — the RELIABLE sibling of Edge above: the SAME neural voices, but over
# the official Speech service with a real API, an SLA, and a FREE monthly tier (~0.5M characters/mo,
# generous for NPC chatter). No ToS/reliability asterisk — this is the shippable low/zero-cost way to
# give the cast big voice variety. Select it with [tts].provider = "azure" (persona) or
# [audio.voices].cast_provider = "azure" / a per-role override (cast).
#
# Needs a Speech resource key + its region. The key comes from this git-ignored file (copy
# AzureSpeechKey.txt.example), DPAPI-encrypted at rest; env vars are NOT read for keys (#22). NEVER
# commit the key. `region` MUST match your Speech resource's region (e.g. eastus, westus2, uksouth).
api_key_file = "AzureSpeechKey.txt"
region       = "eastus"
# Persona/status voice ShortName when [tts].provider = "azure" (same names as Edge). Browse them at
# https://learn.microsoft.com/azure/ai-services/speech-service/language-support?tabs=tts
voice = "en-US-AriaNeural"
# Optional SSML speaking style/emotion (voice-dependent), e.g. "cheerful", "newscast", "chat".
# Blank = the voice's neutral default. An unsupported style is ignored by the service.
style = ""

[openai_tts]
# OpenAI-compatible TTS — a CHEAP cloud voice (modest voice count; best as a persona or a
# supplemental cast voice). Select it with [tts].provider = "openai" or [audio.voices].cast_provider
# = "openai" / a per-role override. `base_url` is configurable, so any OpenAI-compatible endpoint
# (OpenAI, a proxy, a local server) works with the same code.
#
# The key comes from this git-ignored file (copy OpenAIAPIKey.txt.example), DPAPI-encrypted at rest
# and SHARED with the OpenAI LLM provider (same default file). Env vars are NOT read for keys (#22).
# NEVER commit the key.
base_url     = "https://api.openai.com/v1"
api_key_file = "OpenAIAPIKey.txt"
# TTS model + voice. gpt-4o-mini-tts is the current cheap model; "tts-1" is the classic alternative.
# Voices: alloy, ash, ballad, coral, echo, fable, nova, onyx, sage, shimmer, verse.
model = "gpt-4o-mini-tts"
voice = "alloy"
# Optional free-text tone/delivery steer, honored by newer models (gpt-4o-mini-tts), ignored by
# older ones (tts-1). Blank = the voice's default. e.g. "Calm, professional ship-computer tone."
instructions = ""

[cartesia]
# Cartesia (Sonic) — a LOW-LATENCY PREMIUM persona voice: a snappier (faster time-to-first-audio)
# alternative to ElevenLabs for COVAS's OWN voice. Select it with [tts].provider = "cartesia". This
# is a PERSONA voice only — it is NOT offered for the NPC/comms/chatter cast (premium; its value is
# the live reply, not background chatter). Streams so the first audio starts fast.
# (Deepgram Aura is the documented alternative; Sonic was picked to start.)
#
# The key comes from this git-ignored file (copy CartesiaAPIKey.txt.example), DPAPI-encrypted at
# rest; env vars are NOT read for keys (#22). NEVER commit the key.
api_key_file = "CartesiaAPIKey.txt"
# Sonic model + a Cartesia VOICE ID (required — get one from the Cartesia voice library / API; the
# voice list is at https://play.cartesia.ai or GET https://api.cartesia.ai/voices).
model = "sonic-2"
voice = ""
# Synthesis language (BCP-47 primary subtag), e.g. "en".
language = "en"


[dev]
# Dev-mode mock — DEV/TEST ONLY, not shown in the Settings UI (issue #130). When ON, the LLM/TTS/STT
# are swapped for fakes (canned text, no audio) so you can exercise the full push-to-talk loop while
# iterating on code with ZERO API calls and zero cost. Setting the env var overrides this for a
# one-off run (PowerShell: $env:COVAS_MOCK=1). Leave OFF for real use.
mock = false
