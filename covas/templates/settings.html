<!DOCTYPE html>
<html lang="en" data-theme="{{ theme }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>COVAS++ Settings</title>
<link rel="stylesheet" href="/static/theme.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:Consolas,"Segoe UI",monospace;background:var(--bg);color:var(--text)}
  a{color:var(--accent2);text-decoration:none} a:hover{text-decoration:underline}
  header{display:flex;align-items:center;gap:16px;padding:14px 20px;border-bottom:2px solid var(--accent);
         background:linear-gradient(90deg,var(--header-grad-1),var(--bg));position:sticky;top:0;z-index:5}
  header h1{font-size:20px;margin:0;letter-spacing:3px;color:var(--accent)}
  header .sub{color:var(--muted);font-size:12px;letter-spacing:1px}
  header .spacer{margin-left:auto}
  .search{background:var(--panel-inset);color:var(--text);border:1px solid var(--edge);border-radius:6px;
          padding:8px 12px;font-family:inherit;min-width:240px;font-size:13px}
  .wrap{display:grid;grid-template-columns:200px 1fr;gap:20px;padding:20px;max-width:1200px}
  nav.groups{position:sticky;top:78px;align-self:start;display:flex;flex-direction:column;gap:4px}
  nav.groups a{color:var(--muted);font-size:12px;letter-spacing:1px;padding:4px 8px;border-radius:5px;text-transform:uppercase}
  nav.groups a:hover{color:var(--text);background:var(--panel);text-decoration:none}
  .card{background:var(--panel);border:1px solid var(--edge);border-radius:10px;padding:8px 20px 16px;margin-bottom:18px}
  .card h2{font-size:13px;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin:14px 0 6px}
  .setting{padding:14px 0;border-top:1px solid var(--divider)}
  .setting:first-of-type{border-top:none}
  .setting.hidden{display:none}
  .setting .top{display:flex;align-items:center;gap:12px}
  .setting .label{font-size:14px;flex:0 0 240px}
  .setting.dirty .label{color:var(--accent)}
  .setting .control{flex:1;display:flex;align-items:center;gap:10px;justify-content:flex-end}
  .setting .help{color:var(--muted);font-size:12px;margin-top:6px;line-height:1.5;max-width:640px}
  .setting .example{color:var(--faint);font-style:italic}
  /* Search-match highlight (issue #95) — readable on the dark panel and on a light theme alike. */
  mark.hl{background:var(--highlight-bg);color:inherit;border-radius:2px;padding:0 1px}
  .setting .err{color:var(--err);font-size:12px;margin-top:6px;display:none}
  .setting.invalid .err{display:block}
  .reset{color:var(--faint);font-size:11px;letter-spacing:1px;cursor:pointer;visibility:hidden;white-space:nowrap}
  .reset:hover{color:var(--accent2)}
  .setting.overridden .reset{visibility:visible}
  select,input[type=text],input[type=number],input[type=password]{background:var(--panel-inset);color:var(--text);border:1px solid var(--edge);
    border-radius:5px;padding:7px 9px;font-family:inherit;font-size:13px;min-width:200px}
  input[type=number]{min-width:120px;text-align:right}
  /* Compact type-to-filter box that sits beside a voice <select> (issue #26). */
  input.voicefilter{min-width:120px;max-width:150px;font-size:12px}
  input.invalid,select.invalid{border-color:var(--err)}
  /* Editable combobox (issue #92): a fetched dropdown you can also type into. A value outside the
     fetched catalog is the "custom / at your own risk" escape hatch — flagged, never blocked. */
  .combo{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex:1}
  .combo .pickrow{display:flex;align-items:center;gap:8px;width:100%;justify-content:flex-end}
  .combo input[type=text]{min-width:220px}
  .combo .custom{color:var(--accent);font-size:11px;letter-spacing:.3px}
  .combo .custom.hidden{display:none}
  .combo .catmsg{color:var(--muted);font-size:11px}
  .pickbtn{background:transparent;color:var(--muted);border:1px solid var(--edge);border-radius:5px;
    padding:6px 10px;font-family:inherit;font-size:12px;cursor:pointer;white-space:nowrap}
  .pickbtn:hover{color:var(--text);border-color:var(--accent2)}
  .unit{color:var(--muted);font-size:12px;min-width:52px}
  .toggle{position:relative;width:50px;height:26px;background:var(--toggle-off);border-radius:20px;cursor:pointer;
    border:1px solid var(--edge);transition:.15s;flex:0 0 auto}
  .toggle.on{background:var(--accent)}
  .toggle .knob{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:var(--knob);transition:.15s}
  .toggle.on .knob{left:26px}
  .savebar{position:fixed;left:0;right:0;bottom:0;display:flex;align-items:center;gap:14px;
    padding:12px 22px;background:var(--panel-inset);border-top:1px solid var(--accent);transform:translateY(120%);transition:.18s}
  .savebar.show{transform:translateY(0)}
  .savebar .count{color:var(--muted);font-size:13px;margin-right:auto}
  .savebar button{padding:10px 20px;border-radius:6px;font-family:inherit;letter-spacing:1px;cursor:pointer;font-size:13px}
  .btn-save{background:var(--accent);color:var(--on-accent);border:1px solid var(--accent)}
  .btn-save:hover{filter:brightness(1.1)}
  .btn-revert{background:transparent;color:var(--muted);border:1px solid var(--edge)}
  .btn-revert:hover{color:var(--text)}
  .toast{position:fixed;top:74px;right:20px;background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-edge);
    padding:10px 16px;border-radius:6px;font-size:13px;opacity:0;transform:translateY(-8px);transition:.2s;pointer-events:none;z-index:9}
  .toast.show{opacity:1;transform:translateY(0)}
  .toast.bad{background:var(--danger-bg);color:var(--err);border-color:var(--danger-edge)}
  .empty{color:var(--muted);padding:40px;text-align:center}
  .kbadge{font-size:11px;letter-spacing:1px;padding:3px 8px;border-radius:10px;text-transform:uppercase;
    border:1px solid var(--err-edge);color:var(--err);background:var(--err-bg);flex:0 0 auto}
  .kbadge.on{border-color:var(--ok-edge);color:var(--ok);background:var(--ok-bg)}
  .kbtn{background:transparent;color:var(--muted);border:1px solid var(--edge);border-radius:5px;
    padding:7px 12px;font-family:inherit;font-size:12px;letter-spacing:1px;cursor:pointer}
  .kbtn:hover{color:var(--text);border-color:var(--accent2)}
  .kbtn.set{color:var(--on-accent);background:var(--accent);border-color:var(--accent)}
  .kbtn.set:hover{filter:brightness(1.1);color:var(--on-accent)}
  .setting .kmsg{color:var(--muted);font-size:12px;margin-top:6px;min-height:0}
  .setting .kmsg.ok{color:var(--ok)} .setting .kmsg.bad{color:var(--err)}
</style>
</head>
<body>
<header>
  <h1>COVAS++</h1>
  <span class="sub">SETTINGS</span>
  <a href="/" class="sub" style="color:var(--accent2)">← control panel</a>
  <a href="/checklist" class="sub" style="color:var(--accent2);text-decoration:none">☑ checklist</a>
  <a href="/memory" class="sub" style="color:var(--accent2);text-decoration:none">🧠 memory</a>
  <a href="/crew" class="sub" style="color:var(--accent2);text-decoration:none">🎙 crew</a>
  <span class="spacer"></span>
  <input class="search" id="search" placeholder="Filter settings…" autocomplete="off">
</header>

<div class="wrap">
  <nav class="groups" id="groupNav"></nav>
  <main id="main"><div class="empty">Loading settings…</div></main>
</div>

<div class="savebar" id="savebar">
  <span class="count" id="dirtyCount"></span>
  <button class="btn-revert" id="revertBtn">REVERT</button>
  <button class="btn-save" id="saveBtn">SAVE CHANGES</button>
</div>
<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
let GROUPS = [];                 // schema groups from the server
const ORIG = {};                 // key -> current (saved) value
const EDITS = {};                // key -> pending new value
let EL = null;                   // {models:[...], voices:[...]} once fetched

// Masked "API keys" card (issue #23) — hand-built, NOT schema-driven, so keys never touch
// overrides.json. Write-only: we send new keys, only ever read a set/not-set boolean back.
const KEY_PROVIDERS = [
  {section:"anthropic",  label:"Anthropic",    placeholder:"sk-ant-…",   url:"https://console.anthropic.com/settings/keys"},
  {section:"elevenlabs", label:"ElevenLabs",   placeholder:"paste key",  url:"https://elevenlabs.io/app/settings/api-keys"},
  {section:"openai",     label:"OpenAI",       placeholder:"sk-…",       url:"https://platform.openai.com/api-keys"},
  {section:"gemini",     label:"Gemini",       placeholder:"paste key",  url:"https://aistudio.google.com/apikey"},
  {section:"azure",      label:"Azure Speech", placeholder:"paste key",  url:"https://portal.azure.com/"},
  {section:"cartesia",   label:"Cartesia",     placeholder:"paste key",  url:"https://play.cartesia.ai/"},
  {section:"cg",         label:"Inara",        placeholder:"paste key",  url:"https://inara.cz/settings-api/"},
];
let KEYS = {};                   // section -> bool (set/not-set); NEVER the key material

function esc(s){return (s||"").replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function slug(name){return "g-"+name.toLowerCase().replace(/[^a-z0-9]+/g,"-");}

async function load(){
  const data = await (await fetch("/api/schema")).json();
  GROUPS = data.groups;
  // Fill ElevenLabs option lists (may fail offline — settings still render).
  try{
    const r = await (await fetch("/api/elevenlabs")).json();
    if(!r.error) EL = r;
  }catch(e){ /* leave EL null; those selects show the current value only */ }
  try{ KEYS = (await (await fetch("/api/keys")).json()).keys || {}; }
  catch(e){ KEYS = {}; /* card still renders; badges default to not-set */ }
  render();
}

function optionsFor(s){
  if(s.options) return s.options.map(v=>({value:v,label:v||"(none)"}));
  if(s.options_source==="@elevenlabs_models" && EL)
    return EL.models.map(m=>({value:m.model_id,label:m.name||m.model_id}));
  if(s.options_source==="@elevenlabs_voices" && EL)
    return EL.voices.map(v=>({value:v.voice_id,label:v.name+(v.category?" ["+v.category+"]":"")}));
  // Dynamic list we couldn't resolve — offer at least the current value.
  return [{value:s.value,label:(s.value===""?"(none)":s.value)}];
}

function render(){
  const nav = $("groupNav"); nav.innerHTML="";
  const main = $("main"); main.innerHTML="";
  nav.appendChild(Object.assign(document.createElement("a"),
    {href:"#g-api-keys", textContent:"API keys"}));
  main.appendChild(keysCard());
  for(const g of GROUPS){
    nav.appendChild(Object.assign(document.createElement("a"),
      {href:"#"+slug(g.name), textContent:g.name}));
    const card = document.createElement("section");
    card.className="card"; card.id=slug(g.name);
    card.innerHTML = '<h2>'+esc(g.name)+'</h2>';
    for(const s of g.settings){ ORIG[s.key]=s.value; card.appendChild(row(s, g.name)); }
    main.appendChild(card);
  }
  syncSaveBar();
}

function row(s, group){
  const wrap = document.createElement("div");
  wrap.className = "setting" + (s.overridden ? " overridden":"");
  wrap.dataset.key = s.key;
  // Filter matches section, title, and description (issue #7) — case-insensitive substring.
  wrap.dataset.search = ((group||"")+" "+s.label+" "+s.help).toLowerCase();

  const top = document.createElement("div"); top.className="top";
  const label = document.createElement("div"); label.className="label"; label.textContent=s.label;
  const control = document.createElement("div"); control.className="control";
  buildControl(control, s);
  const reset = document.createElement("span"); reset.className="reset"; reset.textContent="RESET";
  reset.title="Reset to default"; reset.onclick=()=>resetOne(s.key);

  top.appendChild(label); top.appendChild(control); top.appendChild(reset);
  wrap.appendChild(top);

  const help = document.createElement("div"); help.className="help";
  help.innerHTML = esc(s.help) + (s.example ? ' <span class="example">e.g. “'+esc(s.example)+'”</span>':'');
  help._origHTML = help.innerHTML; // cached so search highlighting (issue #95) can restore cleanly
  wrap.appendChild(help);
  const err = document.createElement("div"); err.className="err";
  wrap.appendChild(err);
  return wrap;
}

function buildControl(control, s){
  if(s.type==="bool"){
    const t = document.createElement("div");
    t.className="toggle"+(s.value?" on":""); t.innerHTML='<div class="knob"></div>';
    t.onclick=()=>{ const v=!t.classList.contains("on"); t.classList.toggle("on",v); edit(s.key,v); };
    control.appendChild(t); return;
  }
  if(s.type==="enum"){
    // Editable combobox for fetched-catalog sources (issue #92): pick from the live list OR type a
    // custom value. Everything else stays a strict <select>.
    if(s.combobox){ control.appendChild(buildCombo(s)); return; }
    const sel = document.createElement("select");
    const selOpts = optionsFor(s);
    for(const o of selOpts) sel.appendChild(new Option(o.label,o.value));
    sel.value = s.value; if(sel.value!==String(s.value)) sel.appendChild(new Option(s.value,s.value)), sel.value=s.value;
    sel.onchange=()=>{
      edit(s.key, sel.value);
      // The theme (issue #104) applies LIVE on selection: stamp data-theme so the whole page
      // recolours immediately (a preview). SAVE persists it via /api/settings/update; REVERT/RESET
      // restores the saved theme through applyThemeFromGroups().
      if(s.key==="ui.theme") document.documentElement.dataset.theme = sel.value;
    };
    // Long fetched lists (ElevenLabs voices/models) get the command palette (#94) — a searchable,
    // keyboard-driven, highlighted picker for the long case. The #26 inline type-to-filter box stays
    // too (for voices), so both paths work; the <select> is the current-value display.
    if(s.options_source){
      const search=document.createElement("button"); search.type="button"; search.className="pickbtn";
      search.textContent="🔍"; search.title="Search "+s.label;
      search.onclick=()=> openPalette({
        title:"Search "+s.label,
        items: selOpts.map(o=>({value:o.value, label:o.label, meta:""})),
        current: sel.value,
        allowCustom:false,   // ElevenLabs voice/model must be a real account id — no free-text
        onPick:(val)=>{ sel.value=val; if(sel.value!==val){ sel.appendChild(new Option(val,val)); sel.value=val; } edit(s.key, val); },
      });
      control.appendChild(search);
    }
    // Voice lists can be long — keep the #26 type-to-filter box beside any *_voices picker (the
    // currently-selected voice always stays visible so the current pick can't vanish behind it).
    if(s.options_source && s.options_source.indexOf("voices")>=0) control.appendChild(voiceFilter(sel));
    control.appendChild(sel); return;
  }
  if(s.type==="int"||s.type==="float"){
    const inp = document.createElement("input"); inp.type="number";
    if(s.min!=null) inp.min=s.min; if(s.max!=null) inp.max=s.max;
    if(s.type==="int") inp.step=1; else inp.step="any";
    inp.value = s.value;
    inp.oninput=()=>edit(s.key, inp.value);
    control.appendChild(inp);
    if(s.unit){ const u=document.createElement("span"); u.className="unit"; u.textContent=s.unit; control.appendChild(u); }
    return;
  }
  // string / path
  const inp = document.createElement("input"); inp.type="text"; inp.value=s.value;
  inp.placeholder = s.type==="path" ? "(default location)" : "";
  inp.oninput=()=>edit(s.key, inp.value);
  control.appendChild(inp);
}

// A compact text box that filters a native <select>'s options by case-insensitive substring of the
// visible label. 3+ chars filters; fewer (or empty) restores the full list (issue #26). Reusable for
// any voice picker (@elevenlabs_voices today; persona/voice-cast later). The selected option stays
// visible so the current pick can't disappear behind the filter.
function voiceFilter(sel){
  const f=document.createElement("input");
  f.type="text"; f.className="voicefilter"; f.autocomplete="off"; f.spellcheck=false;
  f.placeholder="Filter…";
  f.oninput=()=>{
    const q=f.value.trim().toLowerCase();
    const active=q.length>=3;
    for(const o of sel.options) o.hidden = active && !o.selected && !o.textContent.toLowerCase().includes(q);
  };
  return f;
}

// ---- editable combobox + catalog fetch (issue #92) --------------------------------
// Client-side throttle cache so reopening a picker or re-rendering doesn't re-hit the server (which
// itself caches). key = source|base_url -> {options:[{value,label,meta}], error}.
const CATALOG = {};
async function fetchCatalog(source, baseUrl){
  const ck = source+"|"+(baseUrl||"");
  if(CATALOG[ck]) return CATALOG[ck];
  try{
    let url = "/api/catalog?source="+encodeURIComponent(source);
    if(baseUrl) url += "&base_url="+encodeURIComponent(baseUrl);
    const r = await (await fetch(url)).json();
    CATALOG[ck] = {options:r.options||[], error:r.error||null};
  }catch(e){ CATALOG[ck] = {options:[], error:"fetch failed"}; }
  return CATALOG[ck];
}

// The current pending/base value of another setting (for base_url-dependent model lists, #92).
function currentValueOf(key){
  const s = findSetting(key);
  return (key in EDITS) ? EDITS[key] : (s ? s.value : "");
}

// Build one editable combobox. Fail-soft (issue #92 + #26): the input shows the CURRENT value
// immediately (never lost), the catalog loads in the background to fill the datalist, and a typed
// value outside the fetched set is accepted but flagged "custom (unsupported)". Static-option enums
// marked combobox (none today) would pass s.options straight through.
function buildCombo(s){
  const wrap=document.createElement("div"); wrap.className="combo"; wrap.dataset.combo=s.key;
  const row=document.createElement("div"); row.className="pickrow";
  const inp=document.createElement("input"); inp.type="text"; inp.value=(s.value==null?"":s.value);
  inp.autocomplete="off"; inp.spellcheck=false;
  const list=document.createElement("datalist"); list.id="dl-"+s.key.replace(/[^a-z0-9]/gi,"-");
  inp.setAttribute("list", list.id);
  const btn=document.createElement("button"); btn.className="pickbtn"; btn.type="button"; btn.textContent="⟳";
  btn.title="Refresh list";
  const search=document.createElement("button"); search.className="pickbtn"; search.type="button";
  search.textContent="🔍"; search.title="Search (command palette)";
  row.appendChild(inp); row.appendChild(list); row.appendChild(search); row.appendChild(btn);
  const custom=document.createElement("div"); custom.className="custom hidden"; custom.textContent="custom (unsupported)";
  const msg=document.createElement("div"); msg.className="catmsg";
  wrap.appendChild(row); wrap.appendChild(custom); wrap.appendChild(msg);

  let known=new Set();
  let opts=[];   // last-fetched catalog options, fed to the command palette (#94)
  function reflectCustom(){
    const v=inp.value.trim();
    custom.classList.toggle("hidden", v==="" || known.has(v));
  }
  inp.oninput=()=>{ edit(s.key, inp.value); reflectCustom(); };

  async function fill(force){
    // openai.model / openai_tts.model follow their sibling base_url (refetch on change, #92).
    let baseUrl=null;
    if(s.key==="openai.model") baseUrl=currentValueOf("openai.base_url");
    if(s.key==="openai_tts.model") baseUrl=currentValueOf("openai_tts.base_url");
    const ck=s.options_source+"|"+(baseUrl||"");
    if(force) delete CATALOG[ck];
    msg.textContent="loading…";
    const {options,error}=await fetchCatalog(s.options_source, baseUrl);
    opts=options||[];
    list.innerHTML="";
    known=new Set();
    for(const o of opts){
      const opt=document.createElement("option"); opt.value=o.value;
      opt.label=o.meta ? (o.label+" — "+o.meta) : o.label;
      list.appendChild(opt); known.add(o.value);
    }
    // Fail-soft: on offline/no-key/error keep the current value valid + typeable, just say why.
    msg.textContent = error ? ("catalog unavailable ("+error+") — type a value")
                            : (opts.length+" available");
    reflectCustom();
  }
  btn.onclick=()=>fill(true);
  // Command palette (#94): search the (possibly long) catalog with keyboard nav + highlight; a
  // custom/unlisted value is still selectable so the current pick is never lost (fail-soft).
  search.onclick=()=> openPalette({
    title: "Search "+s.label,
    items: opts,
    current: (inp.value||"").trim(),
    onPick: (val)=>{ inp.value=val; edit(s.key, val); reflectCustom(); },
  });
  fill(false);
  wrap._refill=fill;   // so a base_url change can trigger a dependent refetch
  return wrap;
}

// When a base_url combobox changes, refetch its dependent model combobox (issue #92).
function refetchDependents(changedKey){
  const dep = {"openai.base_url":"openai.model", "openai_tts.base_url":"openai_tts.model"}[changedKey];
  if(!dep) return;
  const el=document.querySelector('.combo[data-combo="'+CSS.escape(dep)+'"]');
  if(el && el._refill) el._refill(true);
}

function findSetting(key){
  for(const g of GROUPS) for(const s of g.settings) if(s.key===key) return s;
  return null;
}

function edit(key, raw){
  const s = findSetting(key);
  const val = coerce(s, raw);
  const same = String(val)===String(ORIG[key]);
  const el = document.querySelector('.setting[data-key="'+CSS.escape(key)+'"]');
  if(same){ delete EDITS[key]; el.classList.remove("dirty"); }
  else { EDITS[key]=val; el.classList.add("dirty"); }
  clientValidate(s, val, el);
  refetchDependents(key);   // a base_url change refreshes its dependent model list (issue #92)
  syncSaveBar();
}

function coerce(s, raw){
  if(s.type==="bool") return !!raw;
  if(s.type==="int"){ const n=parseInt(raw,10); return isNaN(n)?raw:n; }
  if(s.type==="float"){ const n=parseFloat(raw); return isNaN(n)?raw:n; }
  return raw;
}

function clientValidate(s, val, el){
  let msg = "";
  if(s.type==="int"||s.type==="float"){
    if(typeof val!=="number" || isNaN(val)) msg=s.label+" must be a number";
    else if(s.min!=null && val<s.min) msg=s.label+" must be at least "+s.min;
    else if(s.max!=null && val>s.max) msg=s.label+" must be at most "+s.max;
  }
  el.classList.toggle("invalid", !!msg);
  el.querySelector(".err").textContent = msg;
  const c = el.querySelector("input,select"); if(c) c.classList.toggle("invalid", !!msg);
  return !msg;
}

function anyInvalid(){ return !!document.querySelector(".setting.invalid"); }

function syncSaveBar(){
  const n = Object.keys(EDITS).length;
  $("savebar").classList.toggle("show", n>0);
  $("dirtyCount").textContent = n+" unsaved change"+(n===1?"":"s");
  $("saveBtn").disabled = anyInvalid();
}

async function save(){
  if(anyInvalid()) return toast("Fix the highlighted values first.", true);
  const r = await fetch("/api/settings/update",{method:"POST",
    headers:{"content-type":"application/json"}, body:JSON.stringify({updates:EDITS})});
  const data = await r.json();
  if(!r.ok){
    for(const [key,msg] of Object.entries(data.errors||{})){
      const el=document.querySelector('.setting[data-key="'+CSS.escape(key)+'"]');
      if(el){ el.classList.add("invalid"); el.querySelector(".err").textContent=msg; }
    }
    return toast("Some settings were rejected.", true);
  }
  applyGroups(data.groups);
  toast("Settings saved.");
}

async function resetOne(key){
  const r = await fetch("/api/settings/reset",{method:"POST",
    headers:{"content-type":"application/json"}, body:JSON.stringify({key})});
  const data = await r.json();
  if(!r.ok) return toast("Reset failed.", true);
  delete EDITS[key];
  applyGroups(data.groups);
  toast("Reset to default.");
}

function applyGroups(groups){
  GROUPS = groups;
  for(const k of Object.keys(EDITS)) delete EDITS[k];
  const q = $("search").value;
  render();
  $("search").value = q; filter();
  applyThemeFromGroups();   // #104: re-sync data-theme to the SAVED value (undo any live preview)
}

// #104: mirror the saved ui.theme onto <html data-theme> — restores the real theme after a REVERT
// or a save, undoing any in-progress live preview so the page never disagrees with what's stored.
function applyThemeFromGroups(){
  const s = findSetting("ui.theme");
  if(s && s.value) document.documentElement.dataset.theme = s.value;
}

function toast(msg, bad){
  const t=$("toast"); t.textContent=msg; t.className="toast show"+(bad?" bad":"");
  clearTimeout(t._h); t._h=setTimeout(()=>t.className="toast"+(bad?" bad":""), 2200);
}

function filter(){
  const raw=$("search").value.trim().toLowerCase();
  // Only filter once the query is 3+ chars; shorter (or empty) shows everything (issue #7).
  const q = raw.length>=3 ? raw : "";
  for(const el of document.querySelectorAll(".setting")){
    const hidden = q && !el.dataset.search.includes(q);
    el.classList.toggle("hidden", hidden);
    // Highlight matches only in visible rows (issue #95) — hidden ones get their marks stripped too,
    // so nothing stale is left behind if the row reappears under a different query later.
    highlightRow(el, hidden ? "" : q);
  }
  for(const card of document.querySelectorAll(".card")){
    const any=[...card.querySelectorAll(".setting")].some(e=>!e.classList.contains("hidden"));
    card.style.display = any?"":"none";
  }
}

// Escape a string for safe use inside a RegExp (issue #95).
function escRe(s){ return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }

// Wrap every case-insensitive occurrence of `q` in a live text node with <mark class="hl">,
// preserving the original casing of the matched text. Operates on real DOM nodes (createTextNode /
// createElement), never innerHTML, so there is no HTML-injection risk from the query string.
function highlightTextNode(node, re){
  const text = node.nodeValue;
  re.lastIndex = 0;
  if(!re.test(text)) return;
  re.lastIndex = 0;
  const frag = document.createDocumentFragment();
  let last = 0, m;
  while((m = re.exec(text))){
    if(m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
    const mark = document.createElement("mark"); mark.className="hl"; mark.textContent = m[0];
    frag.appendChild(mark);
    last = m.index + m[0].length;
  }
  if(last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
  node.parentNode.replaceChild(frag, node);
}

// Walk every text node under `root` (skips tag names/attributes entirely) and highlight matches.
function highlightTextNodesIn(root, q){
  const re = new RegExp(escRe(q), "gi");
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
  const nodes = [];
  let n; while((n = walker.nextNode())) nodes.push(n);
  for(const node of nodes) highlightTextNode(node, re);
}

// Highlight the query in a single row's label + help text, restoring the pristine content first so
// re-filtering never compounds marks or leaves stale ones (issue #95). Rows with no visible match
// text (e.g. an API-key row whose match is only in hidden metadata) simply get nothing highlighted.
function highlightRow(el, q){
  const label = el.querySelector(".label");
  if(label){
    // textContent concatenates all descendant text — including inside existing <mark>s — so
    // reading then rewriting it always yields the original plain string, flattened back to one node.
    label.textContent = label.textContent;
    if(q) highlightTextNodesIn(label, q);
  }
  const help = el.querySelector(".help");
  if(help && help._origHTML!==undefined){
    help.innerHTML = help._origHTML;
    if(q) highlightTextNodesIn(help, q);
  }
}

// ---- API keys card (hand-built, write-only) ----------------------------------------
function keysCard(){
  const card = document.createElement("section");
  card.className="card"; card.id="g-api-keys";
  card.innerHTML='<h2>API keys</h2>';
  const note=document.createElement("div"); note.className="help"; note.style.margin="4px 0 2px";
  note.innerHTML="Stored <b>encrypted</b> on this PC (Windows DPAPI) and never shown here. Paste a "+
    "key to set or rotate it — changes take effect on restart. <b>Anthropic</b> is required; the "+
    "rest are optional (only the providers you actually use).";
  card.appendChild(note);
  for(const p of KEY_PROVIDERS) card.appendChild(keyRow(p));
  return card;
}

function keyRow(p){
  const wrap=document.createElement("div"); wrap.className="setting";
  wrap.dataset.section=p.section;
  wrap.dataset.search=(p.label+" api key "+p.section).toLowerCase();

  const top=document.createElement("div"); top.className="top";
  const label=document.createElement("div"); label.className="label"; label.textContent=p.label;
  const control=document.createElement("div"); control.className="control";
  const badge=document.createElement("span"); badge.className="kbadge";
  const inp=document.createElement("input"); inp.type="password"; inp.autocomplete="off";
  inp.spellcheck=false; inp.placeholder=p.placeholder;
  const saveB=document.createElement("button"); saveB.className="kbtn set ksave";
  const clrB=document.createElement("button"); clrB.className="kbtn kclear"; clrB.textContent="Clear";
  control.appendChild(badge); control.appendChild(inp); control.appendChild(saveB); control.appendChild(clrB);
  top.appendChild(label); top.appendChild(control);
  wrap.appendChild(top);

  const help=document.createElement("div"); help.className="help";
  help.innerHTML='<a href="'+p.url+'" target="_blank" rel="noopener">Get a key →</a>';
  help._origHTML = help.innerHTML; // cached so search highlighting (issue #95) can restore cleanly
  wrap.appendChild(help);
  const msg=document.createElement("div"); msg.className="kmsg"; wrap.appendChild(msg);

  saveB.onclick=()=>saveKey(wrap, inp, msg);
  clrB.onclick=()=>clearKey(wrap, msg);
  inp.onkeydown=e=>{ if(e.key==="Enter"){ e.preventDefault(); saveKey(wrap, inp, msg); } };
  applyRowState(wrap);
  return wrap;
}

function applyRowState(row){
  const set=!!KEYS[row.dataset.section];
  const badge=row.querySelector(".kbadge");
  badge.className="kbadge"+(set?" on":""); badge.textContent=set?"set":"not set";
  row.querySelector(".ksave").textContent=set?"Rotate":"Save";
  row.querySelector(".kclear").style.display=set?"":"none";
}

function kmsg(el, text, ok){ el.textContent=text; el.className="kmsg"+(ok===true?" ok":ok===false?" bad":""); }

async function postKeys(body){
  try{
    const r=await fetch("/api/keys",{method:"POST",headers:{"content-type":"application/json"},
      body:JSON.stringify(body)});
    const data=await r.json().catch(()=>({}));
    return r.ok ? data : {ok:false, error:(data&&data.error)||"request failed"};
  }catch(e){ return {ok:false, error:"request failed"}; }
}

async function saveKey(row, inp, msg){
  const value=(inp.value||"").trim();
  if(!value){ kmsg(msg,"Paste a key first.",false); return; }
  kmsg(msg,"Saving…",null);
  const data=await postKeys({section:row.dataset.section, value});
  if(!data.ok){ kmsg(msg, data.error||"save failed", false); return; }
  KEYS=data.keys||KEYS; inp.value=""; applyRowState(row);
  kmsg(msg,"Saved — restart to use it.",true);
}

async function clearKey(row, msg){
  kmsg(msg,"Clearing…",null);
  const data=await postKeys({section:row.dataset.section, clear:true});
  if(!data.ok){ kmsg(msg, data.error||"clear failed", false); return; }
  KEYS=data.keys||KEYS; applyRowState(row);
  kmsg(msg,"Cleared.",true);
}

$("saveBtn").onclick=save;
$("revertBtn").onclick=()=>{ for(const k of Object.keys(EDITS)) delete EDITS[k]; render(); filter(); applyThemeFromGroups(); };
$("search").oninput=filter;
load();
</script>
