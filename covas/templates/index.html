<!DOCTYPE html>
<html lang="en" data-theme="{{ theme }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>COVAS++ Control Panel</title>
<link rel="stylesheet" href="/static/theme.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:Consolas,"Segoe UI",monospace;background:var(--bg);color:var(--text)}
  header{display:flex;align-items:center;gap:16px;padding:14px 20px;border-bottom:2px solid var(--accent);background:linear-gradient(90deg,var(--header-grad-1),var(--bg))}
  header h1{font-size:20px;margin:0;letter-spacing:3px;color:var(--accent)}
  header .sub{color:var(--muted);font-size:12px;letter-spacing:1px}
  .wrap{display:grid;grid-template-columns:360px 1fr;gap:16px;padding:16px;max-width:1200px}
  .card{background:var(--panel);border:1px solid var(--edge);border-radius:8px;padding:16px}
  .card h2{margin:0 0 12px;font-size:13px;letter-spacing:2px;color:var(--accent);text-transform:uppercase}
  .row{display:flex;align-items:center;justify-content:space-between;margin:10px 0;gap:10px}
  .row label{color:var(--muted);font-size:13px}
  select{background:var(--panel-inset);color:var(--text);border:1px solid var(--edge);border-radius:5px;padding:6px 8px;font-family:inherit;min-width:180px}
  /* Voice list + its type-to-filter box, stacked so the filter spans the row (issue #26). */
  .voicerow{flex-direction:column;align-items:stretch;gap:6px}
  .voicerow .voicehead{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .voicerow .voicehead select{flex:1;min-width:0}
  .voicesearch{background:transparent;color:var(--muted);border:1px solid var(--edge);border-radius:5px;
       padding:5px 9px;font-family:inherit;font-size:13px;cursor:pointer;flex:0 0 auto}
  .voicesearch:hover{color:var(--text);border-color:var(--accent2)}
  input.voicefilter{background:var(--panel-inset);color:var(--text);border:1px solid var(--edge);border-radius:5px;
       padding:6px 8px;font-family:inherit;font-size:12px;width:100%}
  /* #86: provider quick-block header — names the ACTIVE provider the block reflects. */
  .pblock .phead{display:flex;align-items:baseline;justify-content:space-between;gap:8px;
       margin:6px 0 2px;color:var(--muted);font-size:11px;letter-spacing:1px;text-transform:uppercase}
  .pblock .phead .pname{color:var(--accent2);font-weight:bold}
  .pblock .phead a{color:var(--muted);text-decoration:none;font-size:11px}
  .pblock .phead a:hover{color:var(--accent2)}
  .pblock input[type=text],.pblock input[type=number]{background:var(--panel-inset);color:var(--text);
       border:1px solid var(--edge);border-radius:5px;padding:6px 8px;font-family:inherit;
       font-size:13px;min-width:180px}
  .pblock input[disabled]{color:var(--muted);opacity:.8}
  .status{display:flex;align-items:center;gap:14px;margin-left:auto}
  .dot{width:16px;height:16px;border-radius:50%;background:var(--dot-idle);box-shadow:0 0 0 rgba(0,0,0,0)}
  .state-name{font-size:16px;letter-spacing:2px;min-width:170px}
  .toggle{position:relative;width:52px;height:26px;background:var(--toggle-off);border-radius:20px;cursor:pointer;border:1px solid var(--edge);transition:.15s}
  .toggle.on{background:var(--accent)}
  .toggle .knob{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:var(--knob);transition:.15s}
  .toggle.on .knob{left:28px}
  button.cancel{width:100%;margin-top:8px;padding:12px;background:var(--danger-bg);color:var(--danger-text);border:1px solid var(--danger-edge);border-radius:6px;font-family:inherit;letter-spacing:2px;cursor:pointer;font-size:14px}
  button.cancel:hover{background:var(--danger-bg-hover)}
  .log{height:62vh;overflow-y:auto;background:var(--log-bg);border:1px solid var(--edge);border-radius:6px;padding:10px;font-size:13px;line-height:1.5;
       -webkit-user-select:text;user-select:text;cursor:text}
  /* Make selection clearly visible on the dark log, and force it on in the packaged webview. */
  .log ::selection{background:var(--sel-bg);color:var(--sel-fg)}
  .log .line{position:relative;margin:2px 0;white-space:pre-wrap;word-break:break-word;padding-right:26px}
  .log .ts{color:var(--ts)}
  /* Per-line copy affordance, revealed on hover. user-select:none keeps its glyph out of a manual
     text selection so a dragged selection stays clean. */
  .linecopy{position:absolute;top:0;right:0;display:none;padding:1px 5px;font-size:11px;line-height:1.4;
       background:var(--btn-bg);color:var(--accent2);border:1px solid var(--edge);border-radius:4px;cursor:pointer;
       font-family:inherit;-webkit-user-select:none;user-select:none}
  .log .line:hover .linecopy{display:inline-block}
  .linecopy:hover{background:var(--btn-hover)}
  .who-Commander{color:var(--accent2)} .who-COVAS{color:var(--accent)} .who-system{color:var(--muted);font-style:italic}
  .who-thinking{color:var(--thinking);font-style:italic}
  .ev-status{color:var(--ev-status)} .ev-status b{color:var(--text-strong)}
  .keys{color:var(--muted);font-size:12px;margin-top:10px;line-height:1.7}
  .keys kbd{background:var(--panel-inset);border:1px solid var(--edge);border-radius:4px;padding:1px 6px;color:var(--text)}
  .err{color:var(--err)}
  .leftcol{display:flex;flex-direction:column;gap:16px}
  input[type=range]{flex:1;min-width:120px;accent-color:var(--accent)}
  .speedval{color:var(--text);font-size:13px;min-width:34px;text-align:right}
  .pv{color:var(--muted);font-size:12px;font-style:italic;line-height:1.5;margin:2px 0 8px;
      border-left:2px solid var(--edge);padding-left:10px;min-height:1em}
  .pbox{width:100%;background:var(--panel-inset);color:var(--text);border:1px solid var(--edge);border-radius:6px;
        padding:8px;font-family:inherit;font-size:12px;line-height:1.5;resize:vertical}
  #personaBody{height:90px} #campaign{height:110px}
  .plabel{display:block;color:var(--muted);font-size:12px;margin:12px 0 4px}
  .prow{display:flex;align-items:center;gap:10px;margin-top:8px}
  .prow button{padding:7px 12px;background:var(--btn-bg);color:var(--accent2);border:1px solid var(--edge);
        border-radius:6px;font-family:inherit;font-size:12px;letter-spacing:1px;cursor:pointer}
  .prow button:hover{background:var(--btn-hover)}
  .pmsg{color:var(--ok);font-size:12px}
  /* Typed-prompt row (issue #76): a text box + a paper-airplane send, above the live log. */
  .promptrow{display:flex;gap:8px;margin-bottom:10px}
  .promptrow input{flex:1;background:var(--panel-inset);color:var(--text);border:1px solid var(--edge);
        border-radius:6px;padding:9px 10px;font-family:inherit;font-size:13px}
  .promptrow input:focus{outline:none;border-color:var(--accent)}
  .promptrow button{padding:9px 14px;background:var(--btn-bg);color:var(--accent2);border:1px solid var(--edge);
        border-radius:6px;font-family:inherit;font-size:15px;cursor:pointer;line-height:1}
  .promptrow button:hover{background:var(--btn-hover)}
  .promptrow button:disabled{opacity:.5;cursor:default}
  .logfilter{float:right;font-size:11px;letter-spacing:1px;font-weight:normal}
  .logfilter a{color:var(--muted);cursor:pointer;text-transform:none}
  .logfilter a.active{color:var(--accent)}
  .log.conv-only .line:not(.conv){display:none}
  .banner{display:none;align-items:center;gap:14px;padding:10px 20px;
      background:linear-gradient(90deg,var(--banner-grad-1),var(--bg));border-bottom:1px solid var(--edge);
      color:var(--banner-text);font-size:13px;letter-spacing:1px}
  .banner.show{display:flex}
  .banner b{color:var(--banner-strong)}
  .banner button{margin-left:auto;padding:7px 14px;background:var(--btn-bg);color:var(--accent2);
      border:1px solid var(--edge);border-radius:6px;font-family:inherit;font-size:12px;
      letter-spacing:1px;cursor:pointer}
  .banner button:hover{background:var(--btn-hover)}
  .banner button:disabled{opacity:.5;cursor:default}
  .banner .dismiss{background:none;border:none;color:var(--muted);margin-left:8px;padding:7px 4px}
  /* #78: small, muted, always-on version tag — fixed corner so it never intrudes on layout. */
  .verlabel{position:fixed;right:10px;bottom:6px;color:var(--muted);font-size:11px;opacity:.55;
      letter-spacing:1px;pointer-events:none;user-select:none}
  /* #77: floating "jump to latest" pill, absolutely positioned over the log so it doesn't
     scroll with its content; .logwrap (not .log, which scrolls) is the positioning parent. */
  .logwrap{position:relative}
  .jumpLatest{display:none;position:absolute;left:50%;bottom:14px;transform:translateX(-50%);
      padding:6px 14px;background:var(--btn-bg);color:var(--accent2);border:1px solid var(--edge);
      border-radius:20px;font-family:inherit;font-size:12px;letter-spacing:1px;cursor:pointer;
      box-shadow:0 2px 10px rgba(0,0,0,.5)}
  .jumpLatest:hover{background:var(--btn-hover)}
  .jumpLatest.show{display:block}
  /* #75: portable selection context menu (packaged PyWebView/WebView2 suppresses the native one). */
  .selmenu{display:none;position:fixed;z-index:1000;background:var(--panel);border:1px solid var(--edge);
      border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.5);padding:4px;min-width:100px}
  .selmenu button{display:block;width:100%;padding:6px 14px;background:none;border:none;
      color:var(--text);font-family:inherit;font-size:13px;text-align:left;cursor:pointer;border-radius:4px}
  .selmenu button:hover{background:var(--menu-hover)}
</style>
</head>
<body>
<header>
  <h1>COVAS++</h1>
  <span class="sub">CONTROL PANEL</span>
  <a href="/settings" class="sub" style="color:var(--accent2);text-decoration:none">⚙ settings</a>
  <a href="/checklist" class="sub" style="color:var(--accent2);text-decoration:none">☑ checklist</a>
  <a href="/memory" class="sub" style="color:var(--accent2);text-decoration:none">🧠 memory</a>
  <a href="/crew" class="sub" style="color:var(--accent2);text-decoration:none">🎙 crew</a>
  <a href="/macros" class="sub" style="color:var(--accent2);text-decoration:none">🎛 macros</a>
  <div class="status">
    <span class="dot" id="dot"></span>
    <span class="state-name" id="stateName">CONNECTING…</span>
  </div>
</header>
<span class="verlabel" id="verLabel" title="COVAS++ version"></span>

<div class="banner" id="updateBanner">
  <span id="updateText"></span>
  <button id="updateBtn">Update &amp; restart</button>
  <button class="dismiss" id="updateDismiss" title="Dismiss">✕</button>
</div>

<div class="wrap">
  <div class="leftcol">
    <div class="card">
      <h2>Configuration</h2>
      <!-- #86: the LLM + Speech blocks REFLECT the active [llm]/[tts].provider — rendered
           generically from the schema payload (see renderProviderBlock). Switch providers on
           the Settings page. -->
      <div class="pblock" id="llmBlock"></div>
      <div class="row"><label>Whisper model</label><select id="whisper"></select></div>
      <div class="pblock" id="ttsBlock"></div>
      <div class="row"><label>Personality</label><div class="toggle" id="personality"><div class="knob"></div></div></div>
      <button class="cancel" id="cancelBtn">■ CANCEL / STOP</button>
      <div class="prow"><button id="openCues">OPEN CUES FOLDER</button><span class="pmsg" id="cuesMsg"></span></div>
      <div class="prow"><button id="reloadCues">RELOAD CUES</button><span class="pmsg" id="cuesReloadMsg"></span></div>
      <div class="keys" id="keys"></div>
    </div>

    <div class="card">
      <h2>Personality</h2>
      <div class="row"><label>Persona</label><select id="persona"></select></div>
      <div class="pv" id="personaPreview"></div>
      <textarea id="personaBody" class="pbox" spellcheck="false"></textarea>
      <div class="prow"><button id="saveCustom">SAVE AS CUSTOM</button><span class="pmsg" id="personaMsg"></span></div>
      <label class="plabel">Campaign — your Commander's personal facts (kept when you switch persona)</label>
      <textarea id="campaign" class="pbox" spellcheck="false" placeholder="e.g. I'm CMDR …, Elite in exploration, I fly an Anaconda named …"></textarea>
      <div class="prow"><button id="saveCampaign">SAVE CAMPAIGN</button><span class="pmsg" id="campaignMsg"></span></div>
    </div>
  </div>

  <div class="card">
    <h2>Live Log <span class="logfilter"><a id="copyLog" title="Copy the whole log to the clipboard (respects the Conversation/All filter)">Copy log</a> · <a id="fConv">Conversation</a> · <a id="fAll">All</a></span></h2>
    <!-- #76: type a prompt to the AI (no mic). Enter or ✈ sends a full normal turn. -->
    <div class="promptrow">
      <input type="text" id="promptInput" placeholder="Type a message to COVAS…" autocomplete="off" spellcheck="false">
      <button id="promptSend" title="Send (Enter)" aria-label="Send prompt">&#9992;</button>
    </div>
    <div class="logwrap">
      <div class="log" id="log"></div>
      <button type="button" class="jumpLatest" id="jumpLatest" title="Jump to the latest log line">↓ Jump to latest</button>
    </div>
  </div>
</div>

<!-- #75: fallback right-click menu for a text selection, since the packaged webview eats the native one -->
<div class="selmenu" id="selMenu"><button type="button" id="selMenuCopy">Copy</button></div>

<script>
// Status-dot colours live in theme.css as var(--state-*) so each theme can retune them. Resolve
// the ACTIVE theme's value at call time (getComputedStyle), so a live theme switch recolours the
// dot on the next status tick without a reload.
const STATE_VARS = {
  Idle:"--state-idle", Listening:"--state-listening", Transcribing:"--state-transcribing",
  Thinking:"--state-thinking", Searching:"--state-searching", Speaking:"--state-speaking"
};
function stateColor(state){
  const name = STATE_VARS[state] || "--state-idle";
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || "#8895a4";
}
const $ = id => document.getElementById(id);

function setStatus(state, extra){
  const c = stateColor(state);
  const dot = $("dot");
  dot.style.background = c;
  dot.style.boxShadow = "0 0 12px " + c;
  $("stateName").textContent = (state || "").toUpperCase() + (extra ? " · " + extra : "");
}
function pad(n){return n<10?"0"+n:n;}
function tstr(ts){const d=new Date((ts||Date.now()/1000)*1000);return pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds());}

// Every rendered log line, as clean plain text (+ conv flag), so Copy reconstructs from DATA —
// not innerText — and honours the Conversation/All filter exactly like the view does.
const LOG = [];

function atBottom(el){ return el.scrollHeight - el.scrollTop - el.clientHeight < 24; }
// True while the user is actively selecting text inside the log — we must NOT auto-scroll then,
// or the moving viewport drops the in-progress selection.
function hasLogSelection(){
  const sel = window.getSelection && window.getSelection();
  if(!sel || sel.isCollapsed || !sel.rangeCount) return false;
  const log = $("log");
  return log.contains(sel.anchorNode) || log.contains(sel.focusNode);
}

function addLog(ev){
  if(ev.type !== "log" && ev.type !== "status") return;
  const log = $("log");
  // Stick to the bottom ONLY if we were already at the bottom and nothing is being selected —
  // so scrolling up to read/copy older lines, or a selection in progress, suspends auto-scroll.
  const stick = atBottom(log) && !hasLogSelection();
  const ts = tstr(ev.ts);
  const div = document.createElement("div");
  let plain, conv = false;
  if(ev.type === "log"){
    div.className = "line";
    // "Conversation" filter keeps only Commander utterances and COVAS replies.
    conv = (ev.who === "Commander" || ev.who === "COVAS");
    if(conv) div.classList.add("conv");
    div.innerHTML = '<span class="ts">'+ts+'</span> ' +
      '<span class="who-'+ev.who+'">'+ev.who+':</span> ' +
      escapeHtml(ev.text);
    plain = ts + "  " + ev.who + ": " + (ev.text || "");
  } else {
    div.className = "line ev-status";
    div.innerHTML = '<span class="ts">'+ts+'</span> » <b>'+ev.state+'</b>'+(ev.extra?' · '+escapeHtml(ev.extra):'');
    plain = ts + "  » " + ev.state + (ev.extra ? " · " + ev.extra : "");
  }
  addLineCopy(div, plain);
  LOG.push({conv, plain});
  log.appendChild(div);
  if(stick){
    log.scrollTop = log.scrollHeight;
  } else {
    // #77: detached from the bottom — surface the jump button and count what arrived while away.
    detachedNewCount++;
    updateJumpBtn();
  }
}

// ---- #77: floating "jump to latest" — visible only while scrolled away from the bottom,
// badged with how many lines arrived since detaching. ----
let detachedNewCount = 0;
function updateJumpBtn(){
  const log = $("log"), btn = $("jumpLatest");
  if(atBottom(log)){
    detachedNewCount = 0;
    btn.classList.remove("show");
  } else {
    btn.textContent = detachedNewCount > 0
      ? ("↓ " + detachedNewCount + " new message" + (detachedNewCount===1?"":"s"))
      : "↓ Jump to latest";
    btn.classList.add("show");
  }
}
function jumpToLatest(){
  const log = $("log");
  log.scrollTop = log.scrollHeight;   // resumes auto-follow: addLog's stick check reads atBottom()
  detachedNewCount = 0;
  updateJumpBtn();
}
function escapeHtml(s){return (s||"").replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

// ---- clipboard: Clipboard API with a legacy execCommand fallback (same pattern the app uses
//      elsewhere for copying systems), so Copy works in the packaged native window too. ----
async function copyText(text){
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){
      await navigator.clipboard.writeText(text);
      return true;
    }
  }catch(e){ /* fall through to the legacy path */ }
  try{
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.top = "-1000px"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  }catch(e){ return false; }
}
function currentLogMode(){ return $("log").classList.contains("conv-only") ? "conversation" : "all"; }
// #74: reports how many lines were copied so the button can affirm it, not just "done".
async function copyLog(){
  const all = currentLogMode() === "all";
  const lines = LOG.filter(e => all || e.conv).map(e => e.plain);
  const ok = await copyText(lines.join("\n"));
  return {ok, count: lines.length};
}
// A small per-line copy button, revealed on hover (see .linecopy). Copies just that line's text.
function addLineCopy(div, plain){
  const b = document.createElement("button");
  b.className = "linecopy"; b.type = "button"; b.title = "Copy this line"; b.textContent = "⎘";
  b.onclick = async (e) => {
    e.stopPropagation();
    const ok = await copyText(plain);
    b.textContent = ok ? "✓" : "✗";
    clearTimeout(b._t); b._t = setTimeout(() => b.textContent = "⎘", 1200);
  };
  div.appendChild(b);
}

function opt(v,t){const o=document.createElement("option");o.value=v;o.textContent=t||v;return o;}

// Type-to-filter a native <select>'s options by case-insensitive substring of the visible label
// (name + category, so "any word" matches). 3+ chars filters; fewer (or empty) restores the full
// list (issue #26). The selected option always stays visible so the current pick can't vanish.
function filterOptions(sel, raw){
  const q = (raw||"").trim().toLowerCase();
  const active = q.length >= 3;
  for(const o of sel.options)
    o.hidden = active && !o.selected && !o.textContent.toLowerCase().includes(q);
}

// Schema-key writes go straight to the validated schema endpoint (issue #86): the quick panel is
// provider-generic now, so it posts canonical dotted keys instead of the old friendly aliases.
function postKey(key, value){
  return fetch("/api/settings/update",{method:"POST",headers:{"content-type":"application/json"},
    body:JSON.stringify({key, value})});
}
function postUpdates(updates){
  return fetch("/api/settings/update",{method:"POST",headers:{"content-type":"application/json"},
    body:JSON.stringify({updates})});
}

let SETTINGS = {};
let EL_VOICES = [];   // fetched ElevenLabs voices, fed to the command palette (#94)
// Live per-field value setters, keyed by dotted schema key, so a settings event (a voice command
// changed a value) can update the control in place without a full re-render.
let FIELD_SETTERS = {};
let LLM_PROVIDER = null, TTS_PROVIDER = null;

async function init(){
  const st = await (await fetch("/api/state")).json();
  SETTINGS = st.settings;
  $("verLabel").textContent = st.version ? ("v" + st.version) : "";   // #78

  (st.options.whisper||[]).forEach(w=>$("whisper").appendChild(opt(w)));
  $("whisper").value = st.settings.whisper;
  setToggle("personality", st.settings.personality);
  $("keys").innerHTML = "Hold <kbd>"+st.keys.push_to_talk+"</kbd> to talk &nbsp;·&nbsp; " +
                        "tap it briefly to cancel &nbsp;·&nbsp; Quit <kbd>Ctrl+Alt+Q</kbd>";
  setStatus(st.status, "");

  $("whisper").onchange = e => postKey("whisper.model", e.target.value);

  // #86: render the LLM + Speech blocks from the active-provider payload. Each fetches only the
  // catalogs its own fields need (ElevenLabs ONLY when TTS = elevenlabs), all fail-soft.
  await renderLLM(st.settings.llm);
  await renderTTS(st.settings.tts);

  $("personality").onclick = () => { const v=!getToggle("personality"); setToggle("personality",v); postKey("personality.enabled", v); };
  $("cancelBtn").onclick = () => fetch("/api/cancel",{method:"POST"});

  // Typed prompt (#76): Enter or ✈ sends a FULL normal turn (skips STT). Clears on send; the
  // reply arrives over the same live log/status the voice loop uses, so no extra plumbing here.
  const sendPrompt = async () => {
    const inp = $("promptInput"), btn = $("promptSend");
    const text = (inp.value || "").trim();
    if (!text) return;                       // empty/whitespace ignored (server rejects it too)
    inp.value = ""; btn.disabled = true;
    try { await fetch("/api/prompt",{method:"POST",headers:{"content-type":"application/json"},
                                     body:JSON.stringify({text})}); }
    catch(e){ /* the turn failing shows in the live log; keep the panel responsive */ }
    finally { btn.disabled = false; inp.focus(); }
  };
  $("promptSend").onclick = sendPrompt;
  $("promptInput").addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); sendPrompt(); } });
  $("openCues").onclick = async () => {
    const msg = $("cuesMsg");
    try {
      const r = await (await fetch("/api/cues/open",{method:"POST"})).json();
      msg.textContent = r.opened ? "opened" : (r.path || "couldn't open");
    } catch(e){ msg.textContent = "couldn't open cues folder"; }
  };
  // #109/#110: re-scan the drop-in folders and hot-swap, no restart — pairs with OPEN CUES FOLDER
  // (open -> drop/remove files -> reload). One button covers BOTH surfaces: the turn-stage cues
  // (counts) and the C11 ambient content — SFX/music/chatter/threat (content). Reports per-category
  // counts so a drop actually landed.
  $("reloadCues").onclick = async () => {
    const msg = $("cuesReloadMsg");
    try {
      const r = await (await fetch("/api/cues/reload",{method:"POST"})).json();
      const counts = r.counts || {}, content = r.content || {};
      const cueParts = Object.keys(counts).map(k => `${counts[k]} ${k}`);
      const ambParts = Object.keys(content).map(k => `${content[k]} ${k}`);
      const parts = cueParts.concat(ambParts.length ? ["ambient: " + ambParts.join(", ")] : []);
      msg.textContent = "reloaded — " + (parts.length ? parts.join(", ") : "no cue types found");
    } catch(e){ msg.textContent = "couldn't reload cues"; }
  };

  initPersonality();
  initLogFilter();
  initUpdateCheck();
  initSelectionMenu();
  connectWS();
}

// ============================================================================
// #86: provider-generic quick controls. The LLM/Speech blocks REFLECT the active [llm]/[tts]
// provider — index.html no longer hardcodes Anthropic/ElevenLabs element ids. Each block renders
// its provider's schema fields (from public_settings) with a control chosen by field type, and
// posts the canonical dotted key back through the validated schema endpoint. Provider SWITCHING
// lives on the Settings page; a link points there.
// ============================================================================

// Pretty provider names for the block header.
const PROVIDER_LABELS = {
  anthropic:"Anthropic (Claude)", openai:"OpenAI-compatible", gemini:"Google Gemini",
  elevenlabs:"ElevenLabs", edge:"Edge (free)", azure:"Azure",
  cartesia:"Cartesia", piper:"Piper (local)",
};
function providerLabel(p){ return PROVIDER_LABELS[p] || p; }

function blockHeader(kind, provider){
  const h = document.createElement("div"); h.className = "phead";
  h.innerHTML = '<span>'+kind+' — <span class="pname">'+escapeHtml(providerLabel(provider))+
    '</span></span><a href="/settings" title="Switch provider on the Settings page">change ⚙</a>';
  return h;
}

// Normalize a field's option list to [{value,label,meta}]. Server enums arrive as bare strings;
// fetched catalogs / ElevenLabs arrive as dicts — accept either so one renderer covers all.
function normOpts(list){
  return (list||[]).map(o => {
    if(typeof o === "string") return {value:o, label:o, meta:""};
    const value = o.value != null ? o.value : (o.voice_id || o.model_id || "");
    return {value, label:o.label || o.name || value, meta:o.meta || o.category || ""};
  });
}

// Fetch a fetched-catalog options_source (editable comboboxes: OpenAI/Gemini models, Edge/
// Azure/Cartesia voices). ALWAYS resolves to an array (possibly []) — fail-soft, never throws — so
// the control degrades to free-text with the current value kept.
async function fetchCatalog(source, baseUrl){
  try{
    let url = "/api/catalog?source=" + encodeURIComponent(source);
    if(baseUrl) url += "&base_url=" + encodeURIComponent(baseUrl);
    const r = await (await fetch(url)).json();
    return normOpts(r.options);
  }catch(e){ return []; }
}

// Build the control element for one field, wire its change handler, and register a value setter
// in FIELD_SETTERS so a later settings event can update it in place. `opts` is the resolved option
// list (already normalized) when the caller pre-fetched one (ElevenLabs, catalogs); otherwise the
// field's own server-resolved options are used. `baseUrl` seeds a combobox catalog refetch.
function buildControl(field, opts){
  const key = field.key;
  const register = fn => { FIELD_SETTERS[key] = fn; };

  // Read-only reflection (e.g. OpenAI base URL): show it, edit it on the Settings page.
  if(field.readonly){
    const inp = document.createElement("input"); inp.type="text"; inp.disabled = true;
    inp.value = field.value == null ? "" : field.value;
    inp.title = "Change this on the Settings page";
    register(v => { inp.value = v == null ? "" : v; });
    return inp;
  }

  const t = field.type;

  if(t === "bool"){
    const tg = document.createElement("div"); tg.className = "toggle";
    tg.innerHTML = '<div class="knob"></div>';
    const set = on => tg.classList.toggle("on", !!on);
    set(field.value);
    tg.onclick = () => { const v = !tg.classList.contains("on"); set(v); postKey(key, v); };
    register(set);
    return tg;
  }

  if(t === "int" || t === "float"){
    const isFloat = t === "float";
    if(field.min != null && field.max != null){        // bounded → slider (e.g. voice speed)
      const wrap = document.createElement("span"); wrap.style.display="flex";
      wrap.style.alignItems="center"; wrap.style.gap="8px"; wrap.style.flex="1";
      const r = document.createElement("input"); r.type="range";
      r.min = field.min; r.max = field.max; r.step = isFloat ? 0.05 : 1;
      const unit = field.unit || (isFloat ? "×" : "");
      const fmt = v => (isFloat ? (+v).toFixed(2) : (""+v)) + unit;
      r.value = field.value;
      const val = document.createElement("span"); val.className="speedval"; val.textContent = fmt(field.value);
      r.oninput = () => val.textContent = fmt(r.value);
      r.onchange = () => postKey(key, +r.value);
      register(v => { if(v!=null && +r.value!==+v){ r.value=v; val.textContent=fmt(v); } });
      wrap.appendChild(r); wrap.appendChild(val);
      return wrap;
    }
    const n = document.createElement("input"); n.type="number";
    if(field.min != null) n.min = field.min;
    if(field.max != null) n.max = field.max;
    n.value = field.value;
    n.onchange = () => postKey(key, +n.value);
    register(v => { if(v!=null) n.value = v; });
    return n;
  }

  if(t === "enum" && field.combobox){                  // editable combobox: datalist + free text
    const inp = document.createElement("input"); inp.type="text";
    inp.setAttribute("list", "dl_" + key.replace(/\W/g,"_"));
    inp.value = field.value == null ? "" : field.value;
    const dl = document.createElement("datalist"); dl.id = "dl_" + key.replace(/\W/g,"_");
    const fill = list => { dl.innerHTML=""; (list||[]).forEach(o=>{
      const od=document.createElement("option"); od.value=o.value; od.label=o.label; dl.appendChild(od); }); };
    fill(opts);
    inp.onchange = () => postKey(key, inp.value.trim());
    register(v => { if(v!=null) inp.value = v; });
    const span = document.createElement("span"); span.style.display="inline-flex"; span.style.flex="1";
    span.appendChild(inp); span.appendChild(dl);
    return span;
  }

  if(t === "enum"){                                    // strict select
    const sel = document.createElement("select");
    const list = normOpts(field.options).length ? normOpts(field.options) : (opts || []);
    list.forEach(o => sel.appendChild(opt(o.value, o.label)));
    // Keep the current value reachable even if it isn't in the (maybe failed) fetched list.
    if(field.value != null && ![...sel.options].some(o=>o.value===field.value))
      sel.appendChild(opt(field.value, field.value + " (current)"));
    sel.value = field.value;
    sel.onchange = () => postKey(key, sel.value);
    register(v => { if(v!=null && sel.value!==v) sel.value = v; });
    return sel;
  }

  // string / path → free text
  const inp = document.createElement("input"); inp.type="text";
  inp.value = field.value == null ? "" : field.value;
  inp.placeholder = field.default || "";
  inp.onchange = () => postKey(key, inp.value);
  register(v => { if(v!=null) inp.value = v; });
  return inp;
}

// One label + control row for a field.
function fieldRow(field, opts){
  const row = document.createElement("div"); row.className = "row";
  const lab = document.createElement("label"); lab.textContent = field.label; lab.title = field.help || "";
  row.appendChild(lab);
  row.appendChild(buildControl(field, opts));
  return row;
}

// The ElevenLabs voice row keeps its type-to-filter (#26) + search palette (#94), since its catalog
// is 100+ voices; it also pairs voice_name with the id. Rendered here (still driven by the payload)
// rather than as a plain combobox. `voices` is the normalized fetched list ([] on failure).
function elevenVoiceRow(field, voices){
  const row = document.createElement("div"); row.className = "row voicerow";
  const head = document.createElement("div"); head.className = "voicehead";
  const lab = document.createElement("label"); lab.textContent = field.label;
  const sel = document.createElement("select");
  const search = document.createElement("button"); search.type="button"; search.className="voicesearch";
  search.title="Search voices"; search.textContent="🔍";
  head.appendChild(lab); head.appendChild(sel); head.appendChild(search);
  const filter = document.createElement("input"); filter.type="text"; filter.className="voicefilter";
  filter.placeholder="Filter voices (3+ chars)…"; filter.autocomplete="off";
  row.appendChild(head); row.appendChild(filter);

  voices.forEach(v => sel.appendChild(opt(v.value, v.label + (v.meta?" ["+v.meta+"]":""))));
  if(field.value != null && ![...sel.options].some(o=>o.value===field.value))
    sel.appendChild(opt(field.value, field.value + " (current)"));
  if(!voices.length && field.value == null) sel.appendChild(opt("", "(fetch failed)"));
  sel.value = field.value;

  const setVoice = (id, name) => {
    if(sel.value !== id){ if(![...sel.options].some(o=>o.value===id)) sel.appendChild(opt(id, name||id)); sel.value = id; }
    postUpdates({ "elevenlabs.voice_id": id, "elevenlabs.voice_name": (name||"").split(" [")[0] });
  };
  sel.onchange = e => setVoice(e.target.value, e.target.selectedOptions[0].textContent);
  filter.oninput = e => filterOptions(sel, e.target.value);
  search.onclick = () => openPalette({
    title:"Search ElevenLabs voices",
    items: voices.map(v=>({value:v.value, label:v.label, meta:v.meta||""})),
    current: sel.value, allowCustom:false,
    onPick:(id,label)=>setVoice(id,label),
  });
  FIELD_SETTERS[field.key] = v => { if(v!=null && sel.value!==v) sel.value = v; };
  return row;
}

async function renderLLM(llm){
  LLM_PROVIDER = llm.provider;
  const host = $("llmBlock"); host.innerHTML = "";
  host.appendChild(blockHeader("LLM", llm.provider));
  for(const f of (llm.fields||[])){
    let opts = null;
    if(f.combobox && !f.readonly){
      // base_url for the OpenAI model catalog comes from the sibling base_url field's value.
      const baseUrl = f.key === "openai.model"
        ? ((llm.fields.find(x=>x.key==="openai.base_url")||{}).value || null) : null;
      opts = await fetchCatalog(f.options_source, baseUrl);
    }
    host.appendChild(fieldRow(f, opts));
  }
}

async function renderTTS(tts){
  TTS_PROVIDER = tts.provider;
  const host = $("ttsBlock"); host.innerHTML = "";
  host.appendChild(blockHeader("Speech", tts.provider));

  // ElevenLabs is the ONLY provider whose model/voice come from /api/elevenlabs — fetch it once,
  // and ONLY for elevenlabs (issue #86). Fail-soft: an empty list degrades to the current value.
  let elModels = [], elVoices = [];
  if(tts.provider === "elevenlabs"){
    try{
      const el = await (await fetch("/api/elevenlabs")).json();
      if(el.error) throw new Error(el.error);
      EL_VOICES = el.voices || [];
      elModels = (el.models||[]).map(m=>({value:m.model_id, label:m.name||m.model_id, meta:""}));
      elVoices = (el.voices||[]).map(v=>({value:v.voice_id, label:v.name||v.voice_id, meta:v.category||""}));
    }catch(err){ addLog({type:"log",who:"system",text:"ElevenLabs list fetch failed: "+err.message}); }
  }

  for(const f of (tts.fields||[])){
    if(f.key === "elevenlabs.voice_id"){ host.appendChild(elevenVoiceRow(f, elVoices)); continue; }
    let opts = null;
    if(f.key === "elevenlabs.model") opts = elModels;
    else if(f.combobox && !f.readonly) opts = await fetchCatalog(f.options_source, null);
    host.appendChild(fieldRow(f, opts));
  }
}

// ---- #75: custom right-click menu for a text selection. The packaged PyWebView/WebView2
// window suppresses the native context menu entirely (no Copy there otherwise); this portable
// JS menu stands in for it and works the same way in a plain browser tab. ----
function initSelectionMenu(){
  const menu = $("selMenu");
  const hide = () => { menu.style.display = "none"; };
  document.addEventListener("contextmenu", e => {
    if(e.target.closest(".linecopy")) return;    // leave the per-line copy button's own affordance alone
    const sel = window.getSelection();
    const text = sel ? sel.toString() : "";
    if(!text){ hide(); return; }                 // no selection: nothing for this menu to do
    e.preventDefault();
    menu.style.left = e.clientX + "px";
    menu.style.top = e.clientY + "px";
    menu.style.display = "block";
    $("selMenuCopy").onclick = async () => { await copyText(text); hide(); };
  });
  document.addEventListener("click", e => { if(!e.target.closest("#selMenu")) hide(); });
  document.addEventListener("scroll", hide, true);
  window.addEventListener("blur", hide);
}

// ---- Update banner (Tier-2 self-update) ----
async function initUpdateCheck(){
  let info;
  try{ info = await (await fetch("/api/update")).json(); }
  catch(e){ return; }                        // offline / error: no banner, fail-soft
  if(!info || !info.available) return;
  const asset = info.asset_url;
  $("updateText").innerHTML = "A new version is available — <b>" + escapeHtml(info.latest) +
    "</b> (you're on " + escapeHtml(info.current || "?") + ").";
  const btn = $("updateBtn");
  if(!asset){
    // Release exists but has no installer asset yet: link to it instead of the apply flow.
    btn.textContent = "View release";
    btn.onclick = () => { if(info.url) window.open(info.url, "_blank"); };
  } else {
    btn.onclick = async () => {
      btn.disabled = true; btn.textContent = "Downloading…";
      try{
        const r = await fetch("/api/update/apply",{method:"POST",
          headers:{"content-type":"application/json"},body:JSON.stringify({asset_url:asset})});
        const data = await r.json();
        if(!r.ok || !data.ok) throw new Error((data && data.error) || "update failed");
        btn.textContent = "Restarting…";       // app is quitting; installer takes over
      }catch(err){
        btn.disabled = false; btn.textContent = "Update & restart";
        $("updateText").innerHTML = "Update failed: " + escapeHtml(err.message);
      }
    };
  }
  $("updateDismiss").onclick = () => $("updateBanner").classList.remove("show");
  $("updateBanner").classList.add("show");
}

// ---- Personality tab ----
let PERSONAS = [];
async function initPersonality(){
  try{
    const p = await (await fetch("/api/personality")).json();
    PERSONAS = p.personas || [];
    const sel = $("persona"); sel.innerHTML = "";
    PERSONAS.forEach(x => sel.appendChild(opt(x.name, x.name + (x.source==="custom"?" (custom)":""))));
    sel.value = p.selected;
    $("campaign").value = p.campaign || "";
    showPersona(p.selected);
    sel.onchange = async e => {
      showPersona(e.target.value);
      await fetch("/api/personality/select",{method:"POST",headers:{"content-type":"application/json"},
        body:JSON.stringify({persona:e.target.value})});
      flash("personaMsg","Applied.");
    };
    $("saveCustom").onclick = saveCustom;
    $("saveCampaign").onclick = async () => {
      await fetch("/api/personality/campaign",{method:"POST",headers:{"content-type":"application/json"},
        body:JSON.stringify({campaign:$("campaign").value})});
      flash("campaignMsg","Saved.");
    };
  }catch(err){ addLog({type:"log",who:"system",text:"Personality load failed: "+err.message}); }
}
function personaByName(n){ return PERSONAS.find(x=>x.name===n); }
function showPersona(name){
  const x = personaByName(name) || {};
  $("personaPreview").textContent = x.preview || "";
  $("personaBody").value = x.body || "";
}
async function saveCustom(){
  const base = $("persona").value;
  const name = (window.prompt("Name for this custom persona:", base + " (custom)") || "").trim();
  if(!name) return;
  const r = await fetch("/api/personality/custom",{method:"POST",headers:{"content-type":"application/json"},
    body:JSON.stringify({name, body:$("personaBody").value})});
  const data = await r.json();
  if(!r.ok){ flash("personaMsg", data.error||"Save failed"); return; }
  PERSONAS = data.personas || PERSONAS;
  const sel = $("persona"); sel.innerHTML="";
  PERSONAS.forEach(x => sel.appendChild(opt(x.name, x.name + (x.source==="custom"?" (custom)":""))));
  sel.value = data.selected; showPersona(data.selected);
  flash("personaMsg","Saved & applied.");
}
function flash(id,msg){ const el=$(id); el.textContent=msg; clearTimeout(el._t); el._t=setTimeout(()=>el.textContent="",2000); }

// ---- Live-log filter (Conversation default, persisted) ----
function initLogFilter(){
  const apply = mode => {
    $("log").classList.toggle("conv-only", mode !== "all");
    $("fConv").classList.toggle("active", mode !== "all");
    $("fAll").classList.toggle("active", mode === "all");
    try{ localStorage.setItem("logFilter", mode); }catch(e){}
    updateJumpBtn();   // hidden lines change scrollHeight, so bottom-ness can flip on filter switch
  };
  $("fConv").onclick = () => apply("conversation");
  $("fAll").onclick = () => apply("all");
  $("log").addEventListener("scroll", updateJumpBtn);
  $("jumpLatest").onclick = jumpToLatest;
  $("copyLog").onclick = async () => {
    const el = $("copyLog");
    const {ok, count} = await copyLog();
    el.textContent = ok ? ("Copied " + count + " line" + (count===1?"":"s")) : "Copy failed";
    clearTimeout(el._t); el._t = setTimeout(() => el.textContent = "Copy log", 1500);
  };
  let saved = "conversation";
  try{ saved = localStorage.getItem("logFilter") || "conversation"; }catch(e){}
  apply(saved);
}
function setToggle(id,on){$(id).classList.toggle("on",!!on);}
function getToggle(id){return $(id).classList.contains("on");}

function connectWS(){
  const ws = new WebSocket((location.protocol==="https:"?"wss://":"ws://")+location.host+"/ws");
  ws.onmessage = e => {
    const ev = JSON.parse(e.data);
    if(ev.type==="status") setStatus(ev.state, ev.extra);
    if(ev.type==="settings"){ syncSettings(ev.settings); }
    addLog(ev);
  };
  ws.onclose = () => { setStatus("Idle","disconnected"); setTimeout(connectWS, 1500); };
}
function syncSettings(s){
  if(!s) return;
  // Flat, always-present controls.
  if(s.whisper!=null && $("whisper").value!==s.whisper) $("whisper").value=s.whisper;
  if(s.personality!=null) setToggle("personality", s.personality);
  // Provider-shaped blocks: if the ACTIVE provider changed (a switch on the Settings page), the
  // whole block must re-render (different fields/catalogs); otherwise just push new values into the
  // existing controls via their registered setters (#86).
  if(s.llm){
    if(s.llm.provider !== LLM_PROVIDER) renderLLM(s.llm);
    else (s.llm.fields||[]).forEach(f => { const fn=FIELD_SETTERS[f.key]; if(fn) fn(f.value); });
  }
  if(s.tts){
    if(s.tts.provider !== TTS_PROVIDER) renderTTS(s.tts);
    else (s.tts.fields||[]).forEach(f => { const fn=FIELD_SETTERS[f.key]; if(fn) fn(f.value); });
  }
}
init();
