{# ONE reusable searchable voice picker (issue #120). {% include %}'d into every page that picks a
   voice — the Settings page (settings.html) and the Crew page (crew.html) — so there is exactly ONE
   voice UI, not several divergent ones.

   Issue #214: collapsed from (native <select> + 🔍 button + "Filter…" box) to a SINGLE trigger
   button that shows the full current value and opens the command palette (`_command_palette.html`)
   on click or keyboard. The palette already does search, fuzzy rank, keyboard nav, ✓-current,
   custom values and the "N available" count — so the redundant native control and filter box are
   gone. Depends on the global `openPalette` (include `_command_palette.html` too) and the icon
   sprite (`_icons.html`).

   Fail-soft (CLAUDE.md): options may load async (a catalog fetch) or be empty (offline / no key) —
   the current pick never disappears (shown on the trigger, reachable in the palette), and with
   `allowCustom` the palette accepts a typed custom value (a Piper .onnx path, an unlisted id).

   API (global): buildVoicePicker(opts) -> HTMLElement (the control container; has a `.value` getter)
     opts = {
       value:       current value (string; "" allowed)
       label:       field label, used for the palette title + trigger aria-label
       allowCustom: bool — may the palette accept a typed, unlisted value? (default false)
       blankLabel:  if set, "" renders as this label (e.g. "(random session voice)")
       options:     [{value,label,meta}] preloaded options (optional)
       loadOptions: async () => [{value,label,meta}] — fetched lazily to fill the list (optional)
       onChange:    (value) => void — fired when the selection changes
     } #}
<style>
  .vpick{flex:1;display:flex;align-items:center;gap:8px;justify-content:flex-end}
  .picktrigger{flex:1;min-width:160px;max-width:340px;display:flex;align-items:center;gap:8px;
    background:var(--panel-inset);color:var(--text);border:1px solid var(--edge);border-radius:5px;
    padding:7px 9px;font-family:inherit;font-size:13px;cursor:pointer;text-align:left}
  .picktrigger:hover{border-color:var(--accent2)}
  .picktrigger:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
  .picktrigger .pt-val{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .picktrigger .ic{color:var(--muted)}
</style>
<script>
(function(){
  window.buildVoicePicker = function(opts){
    const label = opts.label || "voice";
    const allowCustom = !!opts.allowCustom;
    const hasBlank = (opts.blankLabel != null);
    let current = (opts.value == null) ? "" : String(opts.value);
    let items = (opts.options || []).slice();   // [{value,label,meta}], latest known list

    const wrap = document.createElement("div"); wrap.className = "vpick";
    const trigger = document.createElement("button");
    trigger.type = "button"; trigger.className = "picktrigger";
    trigger.setAttribute("aria-haspopup", "dialog");
    const valEl = document.createElement("span"); valEl.className = "pt-val";
    trigger.appendChild(valEl);
    // The expand chevron (themable sprite, recolours with the theme — replaces the old ▼/🔍).
    trigger.insertAdjacentHTML("beforeend", '<svg class="ic" aria-hidden="true"><use href="#ic-expand"/></svg>');

    // The full human label for a value: blank->blankLabel, known->label(+meta), else custom/none.
    function labelFor(val){
      if(val === "" && hasBlank) return opts.blankLabel;
      const it = items.find(o => o.value === val);
      if(it) return it.meta ? (it.label + " — " + it.meta) : (it.label || it.value);
      return val === "" ? "(none)" : val;   // an unlisted/custom id, or not-yet-loaded value
    }
    function paint(){
      const txt = labelFor(current);
      valEl.textContent = txt;
      trigger.title = txt;                                   // tooltip when the name overflows
      trigger.setAttribute("aria-label", label + ": " + txt);
    }
    paint();

    // Real <button>: click AND Enter/Space (native) open the palette — keyboard + SR parity (#184).
    trigger.onclick = ()=> openPalette({
      title: "Search " + label,
      items: items.map(o => ({value:o.value, label:o.label, meta:o.meta||""})),
      current: current,
      allowCustom: allowCustom,
      onPick: (val)=>{ current = val; paint(); if(opts.onChange) opts.onChange(val); },
    });

    wrap.appendChild(trigger);

    if(opts.loadOptions){
      Promise.resolve(opts.loadOptions())
        .then(list=>{ items = (list||[]).slice(); paint(); })   // repaint: a value may now resolve to a label
        .catch(()=>{ /* fail-soft: keep the current value + whatever we already had */ });
    }

    Object.defineProperty(wrap, "value", { get: ()=> current });
    return wrap;
  };
})();
</script>
