  - Getting started:
      - Install & setup: getting-started/install.md
      - Running COVAS++: getting-started/running.md
      - Updating COVAS++: getting-started/updating.md
      - The voice loop: getting-started/voice-loop.md
      - Hands-free listening: getting-started/hands-free.md
  - Talking to COVAS:
      - Personas & voice: using/personas-voice.md
      - Interactive crew: using/crew.md
      - The checklist: using/checklist.md
      - Persistent memory: using/memory.md
      - Help & recovery: using/help.md
      - Settings by voice: using/settings.md
      - Copy to clipboard: using/clipboard.md
      - Companion HUD: using/hud.md
  - Elite Dangerous awareness:
      - Game-state monitoring: elite/monitoring.md
      - Proactive callouts: elite/proactive-callouts.md
      - Route callouts: elite/route-callouts.md
      - Ship loadout & engineering: elite/loadout.md
      - Ship specifications: elite/ship-specs.md
      - Credits & currencies: elite/currency-behavior.md
      - Blueprint & material sourcing: elite/blueprints.md
      - Stored ships & modules: elite/stored-ships-modules.md
      - Engineers finder: elite/engineers.md
      - On-foot engineering: elite/on-foot-engineering.md
      - Location & fleet carriers: elite/location-carriers.md
      - Community goals: elite/community-goals.md
  - Voice search:
      - Overview: search/index.md
      - Outfitting (modules): search/outfitting.md
      - Shipyards (ships): search/shipyards.md
      - Star systems: search/star-systems.md
      - Stations: search/stations.md
      - Minor factions: search/minor-factions.md
      - Faction states: search/faction-states.md
      - Signals & structures: search/signals.md
      - Body finder: search/bodies.md
      - Trade-route planner: search/trade-routes.md
      - Neutron / long-range route: search/neutron-route.md
      - Road-to-Riches planner: search/road-to-riches.md
