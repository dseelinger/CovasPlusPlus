site_name: COVAS++
site_description: >-
  A ship's AI for Elite Dangerous — hold a key, talk, and the ship answers in
  character. Grounded in your real game, not guessed: galaxy search and route
  planning by voice, guarded ship controls, personas, a voiced crew, and an
  ambient cockpit soundscape — local-first on your own Windows PC.
site_url: https://dseelinger.github.io/CovasPlusPlus/
repo_url: https://github.com/dseelinger/CovasPlusPlus
repo_name: dseelinger/CovasPlusPlus
copyright: >-
  Unofficial, fan-made. Elite Dangerous is a trademark of Frontier Developments plc.
  COVAS++ is not affiliated with, endorsed by, or supported by Frontier.

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

# Fail the strict build on a broken cross-page link OR a broken #anchor fragment,
# so the docs can't drift into dead links (the CI runs `mkdocs build --strict`).
validation:
  links:
    absolute_links: relative_to_docs
    anchors: warn
    unrecognized_links: warn

nav:
